<!DOCTYPE html><html><head><meta charset="utf-8"><title>Elevation Layers</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">base</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">0</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">raised</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">10</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">sticky</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">100</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">dropdown</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:#4A7CFF">1000</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">overlay (scrim)</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">2000</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">modal</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:#4A7CFF">3000</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">toast</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">4000</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:6px"><span style="font-size:12px;color:var(--gl-fg-2)">tooltip</span><span style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">5000</span></div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">Strict overlay scale so menus, modals, toasts and tooltips never fight for stacking order.</div>
</div>
</body></html>
