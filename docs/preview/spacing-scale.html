<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spacing Scale</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(9, 1fr);gap:10px;align-items:end">
    <!-- 4 -->
    <div><div style="height:4px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">4</div></div>
    <div><div style="height:8px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">8</div></div>
    <div><div style="height:12px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">12</div></div>
    <div><div style="height:16px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">16</div></div>
    <div><div style="height:24px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">24</div></div>
    <div><div style="height:32px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">32</div></div>
    <div><div style="height:40px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">40</div></div>
    <div><div style="height:64px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">64</div></div>
    <div><div style="height:80px;background:#4A7CFF;border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px;text-align:center">80</div></div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    4 px base. Card internal padding is 24. Stacks between cards are 32. Page margin is 64–80.
  </div>
</div>
</body></html>
