<!DOCTYPE html><html><head><meta charset="utf-8"><title>Semantic Colors</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
    <!-- success -->
    <div style="padding:14px;background:var(--gl-dark-bg);border-radius:6px;border:1px solid var(--gl-border)">
      <span style="display:inline-block;padding:4px 10px;background:rgba(29,184,138,.18);color:#1DB88A;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Active</span>
      <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2);margin-top:14px">success-500</div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">#1DB88A</div>
      <div style="font-family:var(--gl-font-mono);font-size:11px;color:#1DB88A;margin-top:8px">+5,240.00</div>
    </div>
    <!-- warning -->
    <div style="padding:14px;background:var(--gl-dark-bg);border-radius:6px;border:1px solid var(--gl-border)">
      <span style="display:inline-block;padding:4px 10px;background:rgba(249,115,22,.18);color:#F97316;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Pending</span>
      <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2);margin-top:14px">warning-500</div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">#F97316</div>
      <div style="font-family:var(--gl-font-mono);font-size:11px;color:#F97316;margin-top:8px">Awaiting</div>
    </div>
    <!-- danger -->
    <div style="padding:14px;background:var(--gl-dark-bg);border-radius:6px;border:1px solid var(--gl-border)">
      <span style="display:inline-block;padding:4px 10px;background:rgba(239,68,68,.18);color:#EF4444;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Failed</span>
      <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2);margin-top:14px">danger-500</div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">#EF4444</div>
      <div style="font-family:var(--gl-font-mono);font-size:11px;color:#EF4444;margin-top:8px">−5,240.00</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    Semantic colors are reserved for state. Never use them as decoration.
  </div>
</div>
</body></html>
