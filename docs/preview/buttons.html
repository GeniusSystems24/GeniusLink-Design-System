<!DOCTYPE html><html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <button style="height:40px;padding:0 16px;background:#4A7CFF;color:#fff;border:none;border-radius:4px;font-family:var(--gl-font-body);font-weight:600;font-size:14px;cursor:pointer">Create Store</button>
    <button style="height:40px;padding:0 16px;background:transparent;color:var(--gl-fg-1);border:1px solid var(--gl-border-strong);border-radius:4px;font-family:var(--gl-font-body);font-weight:500;font-size:14px;cursor:pointer">Cancel</button>
    <button style="height:40px;padding:0 16px;background:transparent;color:#EF4444;border:1px solid rgba(239,68,68,.4);border-radius:4px;font-family:var(--gl-font-body);font-weight:500;font-size:14px;cursor:pointer">Delete</button>
    <button style="height:32px;width:32px;background:var(--gl-input-bg);color:var(--gl-fg-2);border:1px solid var(--gl-border);border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
  <div style="display:flex;gap:24px;font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    <span>height 40 · radius 4</span><span>px 16</span><span>Inter 600 · 14</span>
  </div>
</div>
</body></html>
