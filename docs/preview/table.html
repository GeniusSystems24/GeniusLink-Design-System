<!DOCTYPE html><html><head><meta charset="utf-8"><title>Table Row</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="background:var(--gl-dark-bg);border:1px solid var(--gl-border);border-radius:8px;overflow:hidden">
    <div style="display:grid;grid-template-columns:30px 1.5fr 1fr 1fr 1fr 90px;padding:14px 18px;font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-3);border-bottom:1px solid var(--gl-border)">
      <div>#</div><div>Account</div><div>Currency</div><div style="text-align:right">Amount</div><div>Status</div><div style="text-align:right">Date</div>
    </div>
    <div style="display:grid;grid-template-columns:30px 1.5fr 1fr 1fr 1fr 90px;padding:14px 18px;font-size:13px;color:var(--gl-fg-1);align-items:center;border-bottom:1px solid var(--gl-border)">
      <div style="font-family:var(--gl-font-mono);color:var(--gl-fg-3)">01</div><div>OPS_NY_CHASE_442</div><div>USD</div><div style="text-align:right;font-family:var(--gl-font-mono);color:#1DB88A">+5,240.00</div>
      <div><span style="padding:3px 10px;background:rgba(74,124,255,.18);color:#4A7CFF;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Debit</span></div>
      <div style="text-align:right;font-family:var(--gl-font-mono);font-size:12px;color:var(--gl-fg-2)">15 Dec, 14:20</div>
    </div>
    <div style="display:grid;grid-template-columns:30px 1.5fr 1fr 1fr 1fr 90px;padding:14px 18px;font-size:13px;color:var(--gl-fg-1);align-items:center">
      <div style="font-family:var(--gl-font-mono);color:var(--gl-fg-3)">02</div><div>TREAS_LN_HSBC_900</div><div>USD</div><div style="text-align:right;font-family:var(--gl-font-mono);color:#EF4444">−5,240.00</div>
      <div><span style="padding:3px 10px;background:rgba(239,68,68,.18);color:#EF4444;border-radius:12px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Credit</span></div>
      <div style="text-align:right;font-family:var(--gl-font-mono);font-size:12px;color:var(--gl-fg-2)">15 Dec, 14:21</div>
    </div>
  </div>
</div>
</body></html>
