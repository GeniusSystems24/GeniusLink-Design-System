<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — Patterns</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>html,body{margin:0;padding:0}body{font-family:var(--gl-font-body)}::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--gl-border-strong);border-radius:5px}</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><rect x="20" y="26" width="60" height="10" rx="3" fill="#33353A"/><rect x="20" y="42" width="60" height="10" rx="3" fill="#33353A"/><circle cx="50" cy="70" r="9" fill="none" stroke="#4A7CFF" stroke-width="3" stroke-dasharray="40 12"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ds-kit.jsx"></script>
<script type="text/babel">
const { GLIcon, DSButton, DSSpinner, DSPill, DSChip, DSSearch, DSDivider, Shell, Section, Spec } = window;
const RED = 'var(--gl-danger-500)', GREEN = 'var(--gl-success-500)', BLUE = 'var(--gl-blue-500)', ORANGE = 'var(--gl-warning-500)';

function Note({ children }) { return <div style={{ fontSize: 12, color: 'var(--gl-fg-3)', lineHeight: 1.5, marginTop: 4 }}>{children}</div>; }

/* Search + filter */
function SearchFilter() {
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 12 }}><DSSearch value="downtown" /><div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}><DSChip selected>All</DSChip><DSChip>Assets</DSChip><DSChip>Liabilities</DSChip><DSChip icon="calendar">Dec 2024</DSChip></div><Note>Debounced query + active filter chips; results update live. Clear filters resets to All.</Note></div>;
}
/* Pagination */
function Pagination() {
  return <div style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><span style={{ fontSize: 12, color: 'var(--gl-fg-3)' }}>1–10 of 248</span><div style={{ display: 'flex', gap: 4 }}>{['‹', '1', '2', '3', '…', '25', '›'].map((p, i) => <span key={i} style={{ minWidth: 30, height: 30, padding: '0 8px', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', borderRadius: 6, fontSize: 13, fontFamily: 'var(--gl-font-mono)', background: p === '1' ? BLUE : 'var(--gl-input-bg)', color: p === '1' ? '#fff' : 'var(--gl-fg-2)', border: '1px solid var(--gl-border)' }}>{p}</span>)}</div></div>;
}
/* Permission */
function Permission() {
  return <div style={{ width: '100%', textAlign: 'center', padding: '20px 16px' }}><div style={{ width: 44, height: 44, borderRadius: 999, background: `color-mix(in srgb, ${ORANGE} 16%, transparent)`, color: ORANGE, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 12 }}><GLIcon name="lock" size={22} /></div><div style={{ fontWeight: 700, fontSize: 14, color: 'var(--gl-fg-1)' }}>Camera access needed</div><Note>Attach receipt photos to this entry. We only use the camera while capturing.</Note><div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 14 }}><DSButton size="sm" variant="secondary">Not now</DSButton><DSButton size="sm">Allow</DSButton></div></div>;
}
/* Confirm + delete */
function Confirm({ danger }) {
  return <div style={{ width: '100%', border: '1px solid var(--gl-border-strong)', borderRadius: 'var(--gl-radius-lg)', background: 'var(--gl-surface)', boxShadow: 'var(--gl-shadow)', overflow: 'hidden' }}><div style={{ padding: 16 }}><div style={{ fontWeight: 700, fontSize: 14, color: 'var(--gl-fg-1)' }}>{danger ? 'Delete journal entry?' : 'Post this entry?'}</div><Note>{danger ? 'JV-2024-0226 and its 3 lines will be permanently removed. Logged to the audit trail.' : 'Once posted, the entry can only be reversed, not edited.'}</Note></div><div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, padding: 12, borderTop: '1px solid var(--gl-border)' }}><DSButton size="sm" variant="secondary">Cancel</DSButton><DSButton size="sm" variant={danger ? 'danger' : 'primary'} icon={danger ? 'trash' : 'check'}>{danger ? 'Delete' : 'Post'}</DSButton></div></div>;
}
/* Media upload */
function Upload() {
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}><div style={{ height: 80, border: '1px dashed var(--gl-border-strong)', borderRadius: 'var(--gl-radius-md)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4, color: 'var(--gl-fg-3)' }}><GLIcon name="image" size={20} /><span style={{ fontSize: 12 }}>Drag & drop or browse</span></div><div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: 10, background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)' }}><GLIcon name="doc" size={18} color={BLUE} /><div style={{ flex: 1 }}><div style={{ fontSize: 12.5, color: 'var(--gl-fg-1)' }}>invoice-Q4.pdf</div><div style={{ height: 4, background: 'var(--gl-input-bg)', borderRadius: 999, marginTop: 6 }}><div style={{ width: '64%', height: '100%', background: BLUE, borderRadius: 999 }} /></div></div><span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 11, color: 'var(--gl-fg-3)' }}>64%</span></div></div>;
}
/* Message sending */
function MsgSend() {
  const rows = [['Posted to ledger', 'sent', GREEN], ['Awaiting approval', 'pending', ORANGE], ['Sync failed — retry', 'failed', RED]];
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 8 }}>{rows.map(([t, s, c]) => <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)' }}><span style={{ width: 8, height: 8, borderRadius: 999, background: c }} /><span style={{ flex: 1, fontSize: 13, color: 'var(--gl-fg-1)' }}>{t}</span><DSPill tone={s === 'sent' ? 'success' : s === 'pending' ? 'warning' : 'danger'}>{s}</DSPill></div>)}</div>;
}
/* Offline sync */
function Offline() {
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}><div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: `color-mix(in srgb, ${ORANGE} 10%, transparent)`, border: `1px solid color-mix(in srgb, ${ORANGE} 30%, transparent)`, borderRadius: 'var(--gl-radius-md)' }}><GLIcon name="ban" size={16} color={ORANGE} /><span style={{ flex: 1, fontSize: 13, color: 'var(--gl-fg-1)' }}>Offline — changes saved locally</span><DSPill tone="warning">3 pending</DSPill></div><div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: `color-mix(in srgb, ${GREEN} 10%, transparent)`, border: `1px solid color-mix(in srgb, ${GREEN} 30%, transparent)`, borderRadius: 'var(--gl-radius-md)' }}><GLIcon name="check" size={16} color={GREEN} /><span style={{ flex: 1, fontSize: 13, color: 'var(--gl-fg-1)' }}>Back online — all synced</span><span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 11, color: 'var(--gl-fg-3)' }}>just now</span></div></div>;
}
/* Notification navigation */
function NotifNav() {
  return <div style={{ width: '100%' }}><div style={{ display: 'flex', gap: 10, alignItems: 'flex-start', padding: 12, background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)' }}><span style={{ color: BLUE, display: 'flex' }}><GLIcon name="bell" size={18} /></span><div style={{ flex: 1 }}><div style={{ fontSize: 13, color: 'var(--gl-fg-1)' }}>Wire EXT-2024-0311 approved</div><Note>Tap → deep-links to External Transfer · Details</Note></div><GLIcon name="chevR" size={16} color="var(--gl-fg-3)" /></div></div>;
}

function App() {
  return (
    <Shell title="Patterns" subtitle="GeniusLink Design System · V2 Stage I">
      <Section title="Data patterns" cols="repeat(auto-fill, minmax(300px, 1fr))">
        <Spec label="Search + filter"><SearchFilter /></Spec>
        <Spec label="Pagination"><Pagination /></Spec>
        <Spec label="Notification → navigation"><NotifNav /></Spec>
      </Section>
      <Section title="Confirmation" cols="repeat(auto-fill, minmax(300px, 1fr))">
        <Spec label="Confirm action"><Confirm /></Spec>
        <Spec label="Delete confirmation"><Confirm danger /></Spec>
        <Spec label="Permission request"><Permission /></Spec>
      </Section>
      <Section title="Async & status" cols="repeat(auto-fill, minmax(300px, 1fr))">
        <Spec label="Media upload"><Upload /></Spec>
        <Spec label="Message / posting status"><MsgSend /></Spec>
        <Spec label="Offline-first sync"><Offline /></Spec>
      </Section>
      <Section title="Page-level states" desc="Loading · Empty · Error are documented in the Core Components gallery (State Views) and reused here as the canonical page states." cols="1fr">
        <Spec label="Reference"><div style={{ fontSize: 13, color: 'var(--gl-fg-2)', lineHeight: 1.6 }}>The <strong>Loading</strong>, <strong>Empty</strong> and <strong>Error</strong> patterns share one implementation — the <code style={{ fontFamily: 'var(--gl-font-mono)', color: BLUE }}>StateView</code> component in <code style={{ fontFamily: 'var(--gl-font-mono)' }}>components-core.html</code>. Charts, tables and lists all fall back to it so the empty/error experience is identical everywhere.</div></Spec>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
