<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — New Requirements</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../design_system/tokens.css" />
<style>
  html,body{margin:0;padding:0}
  body{font-family:var(--gl-font-body);background:var(--gl-bg);color:var(--gl-fg-1)}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--gl-border-strong);border-radius:6px}
  a{text-decoration:none;color:inherit}
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><rect x="22" y="20" width="56" height="60" rx="6" fill="none" stroke="#4A7CFF" stroke-width="3"/><line x1="32" y1="34" x2="68" y2="34" stroke="#33353A" stroke-width="3"/><line x1="32" y1="46" x2="68" y2="46" stroke="#33353A" stroke-width="3"/><line x1="32" y1="58" x2="58" y2="58" stroke="#33353A" stroke-width="3"/><circle cx="68" cy="70" r="3" fill="#1DB88A"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../design_system/ds-kit.jsx"></script>
<script type="text/babel" src="_demo.jsx"></script>
<script type="text/babel">
const { useTheme, Segmented, Tag } = window;

const PHASES = [
  { n: '01', file: 'phase-01-keyboard-directions.html', title: 'Keyboard shortcut directions', comps: ['Tabs', 'Tree', 'Editable', 'Readable'], desc: 'Arrow keys map to the visual direction in LTR and RTL; Tree expand/collapse mirror.', status: 'done' },
  { n: '02', file: 'phase-02-scroll-on-focus.html', title: 'Scroll-on-focus', comps: ['Readable', 'Tree'], desc: 'Keyboard focus scrolls an off-screen cell or row into view, both axes.', status: 'done' },
  { n: '03', file: 'phase-03-generic-row-type.html', title: 'Generic row type', comps: ['Editable'], desc: 'EditableTable<T> — rows are a typed value, not a loose map.', status: 'done' },
  { n: '04', file: 'phase-04-column-resizing.html', title: 'Column resizing', comps: ['Readable', 'Editable'], desc: 'Drag handles on headers resize columns live, RTL-correct.', status: 'done' },
  { n: '05', file: 'phase-05-column-reordering.html', title: 'Column reordering', comps: ['Readable', 'Editable'], desc: 'Drag-and-drop header reorder updates the underlying order.', status: 'done' },
  { n: '06', file: 'phase-06-readable-column-types.html', title: 'Column types in ReadableTable', comps: ['Readable'], desc: 'Typed column kinds — text, num, date, time, enum, color — for display.', status: 'done' },
  { n: '07', file: 'phase-07-copy-rows-cells.html', title: 'Copy rows & cells', comps: ['Readable', 'Editable'], desc: 'Selection → tab-separated values on the real clipboard.', status: 'done' },
  { n: '08', file: 'phase-08-tree-selection.html', title: 'Tree single & multi-select', comps: ['Tree'], desc: 'Shift-range, Ctrl/⌘ toggle, checkboxes; selection drives group actions.', status: 'done' },
  { n: '09', file: 'phase-09-tree-add-remove.html', title: 'Tree add & remove nodes', comps: ['Tree'], desc: 'Buttons + context-menu to add and delete nodes; data stays correct.', status: 'done' },
  { n: '10', file: 'phase-10-tab-state.html', title: 'Tab state preservation', comps: ['Tabs'], desc: 'Switching tabs keeps each page alive — no rebuild, no lost state.', status: 'done' },
];

const COMP_TONE = { Tabs: 'blue', Tree: 'green', Editable: 'orange', Readable: 'neutral' };

function StatusDot({ status }) {
  const map = { done: ['var(--gl-success-500)', 'Done'], wip: ['var(--gl-warning-500)', 'In progress'], todo: ['var(--gl-fg-4)', 'Planned'] };
  const [c, label] = map[status] || map.todo;
  return <span style={{ display: 'inline-flex', alignItems: 'center', gap: 7, fontSize: 11, fontWeight: 600, color: status === 'todo' ? 'var(--gl-fg-3)' : c }}>
    <span style={{ width: 8, height: 8, borderRadius: 999, background: c, boxShadow: status === 'done' ? `0 0 0 3px color-mix(in srgb, ${c} 22%, transparent)` : 'none' }} />{label}
  </span>;
}

function Card({ p }) {
  const [hv, setHv] = React.useState(false);
  const live = p.status === 'done';
  const inner = (
    <div onMouseEnter={() => setHv(true)} onMouseLeave={() => setHv(false)}
      style={{ background: 'var(--gl-surface)', border: `1px solid ${hv && live ? 'var(--gl-blue-500)' : 'var(--gl-border)'}`, borderRadius: 'var(--gl-radius-lg)', padding: 20, height: '100%', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', gap: 12, transition: 'border-color var(--gl-dur-base), transform var(--gl-dur-base)', transform: hv && live ? 'translateY(-2px)' : 'none', opacity: live ? 1 : 0.62, cursor: live ? 'pointer' : 'default', boxShadow: hv && live ? 'var(--gl-shadow)' : 'none' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 38, height: 30, borderRadius: 8, background: live ? 'var(--gl-blue-500)' : 'var(--gl-input-bg)', color: live ? '#fff' : 'var(--gl-fg-3)', fontFamily: 'var(--gl-font-mono)', fontWeight: 700, fontSize: 15 }}>{p.n}</span>
        <StatusDot status={p.status} />
      </div>
      <div style={{ fontFamily: 'var(--gl-font-display)', fontWeight: 700, fontSize: 17, lineHeight: 1.2, color: 'var(--gl-fg-1)' }}>{p.title}</div>
      <div style={{ fontSize: 13, color: 'var(--gl-fg-3)', lineHeight: 1.5, flex: 1, textWrap: 'pretty' }}>{p.desc}</div>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {p.comps.map(c => <Tag key={c} tone={COMP_TONE[c]}>{c}</Tag>)}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 12.5, fontWeight: 600, color: live ? 'var(--gl-blue-500)' : 'var(--gl-fg-4)', marginTop: 2 }}>
        {live ? <>Open demo <GLIcon name="chevR" size={14} /></> : 'Not built yet'}
      </div>
    </div>
  );
  return live ? <a href={p.file}>{inner}</a> : inner;
}

function App() {
  const [theme, setTheme] = useTheme();
  const doneCount = PHASES.filter(p => p.status === 'done').length;
  return (
    <div style={{ minHeight: '100vh' }}>
      <div style={{ borderBottom: '1px solid var(--gl-border)', background: 'color-mix(in srgb, var(--gl-bg) 90%, transparent)' }}>
        <div style={{ maxWidth: 1180, margin: '0 auto', padding: '22px 40px', display: 'flex', alignItems: 'center', gap: 16 }}>
          <img src="../assets/logo-mark.png" style={{ width: 30, height: 30 }} alt="GeniusLink" />
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: 'var(--gl-font-display)', fontWeight: 800, fontSize: 19, letterSpacing: '-0.01em' }}>New Requirements</div>
            <div style={{ fontSize: 12.5, color: 'var(--gl-fg-3)' }}>geniuslink_design_system_flutter · 10 phases</div>
          </div>
          <Segmented value={theme} onChange={setTheme} options={['dark', 'light']} />
        </div>
      </div>
      <div style={{ maxWidth: 1180, margin: '0 auto', padding: '34px 40px 120px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 26 }}>
          <div style={{ flex: 1, height: 6, borderRadius: 999, background: 'var(--gl-input-bg)', overflow: 'hidden' }}>
            <div style={{ width: `${doneCount / PHASES.length * 100}%`, height: '100%', background: 'var(--gl-success-500)', transition: 'width var(--gl-dur-slow)' }} />
          </div>
          <span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 13, color: 'var(--gl-fg-2)', fontWeight: 600 }}>{doneCount} / {PHASES.length}</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(290px, 1fr))', gap: 16 }}>
          {PHASES.map(p => <Card key={p.n} p={p} />)}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
