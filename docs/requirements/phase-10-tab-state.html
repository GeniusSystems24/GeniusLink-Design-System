<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Phase 10 — Tab state preservation</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../design_system/tokens.css" />
<style>
  html,body{margin:0;padding:0}
  body{font-family:var(--gl-font-body);background:var(--gl-bg);color:var(--gl-fg-1)}
  *{box-sizing:border-box}
  .pane::-webkit-scrollbar{width:9px}.pane::-webkit-scrollbar-thumb{background:var(--gl-border-strong);border-radius:6px}
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><rect x="20" y="26" width="22" height="12" rx="3" fill="#4A7CFF"/><rect x="44" y="28" width="18" height="10" rx="3" fill="#33353A"/><rect x="64" y="28" width="14" height="10" rx="3" fill="#33353A"/><rect x="20" y="42" width="58" height="34" rx="4" fill="none" stroke="#33353A" stroke-width="2"/><path d="M28 60h20M28 67h32" stroke="#1DB88A" stroke-width="3" stroke-linecap="round"/><circle cx="66" cy="56" r="3" fill="#E0A23B"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../design_system/ds-kit.jsx"></script>
<script type="text/babel" src="_demo.jsx"></script>
<script type="text/babel">
const { useTheme, Segmented, DemoHeader, DemoBody, Panel, Stage, Callout, FixNote, CodeBlock, Kbd, Tag } = window;
const { useState, useRef, useEffect } = React;

const TABS = [
  { id: 't1', label: 'Trial Balance', icon: 'bars' },
  { id: 't2', label: 'Journal JV-0042', icon: 'doc' },
  { id: 't3', label: 'Reconcile · SNB', icon: 'folder' },
];

/* A stateful page: a render counter, a text field, a stepper, and scroll. If the
   page is rebuilt on tab switch, all of this resets. If kept alive, it persists. */
function TabPage({ tab, mode }) {
  const [mounts, setMounts] = useState(0);
  const [note, setNote] = useState('');
  const [qty, setQty] = useState(0);
  // Count actual MOUNTS (not renders): in keep-alive mode the page mounts once
  // and this stays at 1; in rebuild mode it remounts on every switch and climbs.
  useEffect(() => { setMounts(m => m + 1); }, []);
  return (
    <div className="pane" style={{ height: 250, overflowY: 'auto', padding: 18 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <GLIcon name={tab.icon} size={18} color="var(--gl-blue-500)" />
        <span style={{ fontFamily: 'var(--gl-font-display)', fontWeight: 700, fontSize: 16 }}>{tab.label}</span>
        <span style={{ marginInlineStart: 'auto', display: 'flex', alignItems: 'center', gap: 7, fontSize: 11.5, color: mode === 'keep' ? 'var(--gl-success-500)' : 'var(--gl-danger-500)' }}>
          <span style={{ width: 7, height: 7, borderRadius: 999, background: 'currentColor' }} /> {mode === 'keep' ? 'kept alive' : 'rebuilt on switch'}
        </span>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
        <Metric label="Page mounts" value={mounts} hint="resets on rebuild" warn={mode !== 'keep'} />
        <Metric label="Stepper value" value={qty} hint="your edit" />
      </div>

      <div style={{ marginBottom: 14 }}>
        <label style={lbl}>Memo (type something, then switch tabs &amp; come back)</label>
        <input value={note} onChange={e => setNote(e.target.value)} placeholder={`Notes for ${tab.label}…`}
          style={{ width: '100%', height: 38, padding: '0 12px', background: 'var(--gl-input-bg)', border: '1px solid var(--gl-border-strong)', borderRadius: 'var(--gl-radius-sm)', color: 'var(--gl-fg-1)', fontFamily: 'var(--gl-font-body)', fontSize: 13, outline: 'none' }} />
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18 }}>
        <span style={lbl}>Stepper</span>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <DSIconBtn icon="minus" onClick={() => setQty(q => Math.max(0, q - 1))} />
          <span style={{ minWidth: 34, textAlign: 'center', fontFamily: 'var(--gl-font-mono)', fontSize: 15, fontWeight: 600 }}>{qty}</span>
          <DSIconBtn icon="plus" onClick={() => setQty(q => q + 1)} />
        </div>
      </div>

      {/* tall content to create a scroll position */}
      <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--gl-fg-3)', marginBottom: 8 }}>Ledger lines · scroll me down, then switch away</div>
      {Array.from({ length: 14 }).map((_, i) => (
        <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 10px', borderBottom: '1px solid var(--gl-border)', fontSize: 12.5 }}>
          <span style={{ fontFamily: 'var(--gl-font-mono)', color: 'var(--gl-fg-3)' }}>{tab.label.slice(0, 3).toUpperCase()}-{String(i + 1).padStart(3, '0')}</span>
          <span style={{ fontFamily: 'var(--gl-font-mono)' }}>{(Math.sin(i + tab.id.length) * 5000 + 8000).toFixed(2)}</span>
        </div>
      ))}
    </div>
  );
}
const lbl = { fontSize: 10.5, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--gl-fg-3)', display: 'block', marginBottom: 7 };
function Metric({ label, value, hint, warn }) {
  return <div style={{ background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)', padding: '11px 13px' }}>
    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--gl-fg-3)' }}>{label}</div>
    <div style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 22, fontWeight: 700, color: warn && value > 1 ? 'var(--gl-warning-500)' : 'var(--gl-fg-1)', lineHeight: 1.2, marginTop: 2 }}>{value}</div>
    <div style={{ fontSize: 10.5, color: 'var(--gl-fg-4)' }}>{hint}</div>
  </div>;
}
function DSIconBtn({ icon, onClick }) {
  return <button onClick={onClick} style={{ width: 30, height: 30, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', background: 'var(--gl-input-bg)', border: '1px solid var(--gl-border-strong)', borderRadius: 6, cursor: 'pointer', color: 'var(--gl-fg-1)' }}><GLIcon name={icon} size={15} /></button>;
}

function TabBarDemo({ mode }) {
  const [active, setActive] = useState('t1');
  return (
    <div>
      {/* strip */}
      <div style={{ display: 'flex', alignItems: 'stretch', background: 'var(--gl-bg)', borderTopLeftRadius: 'var(--gl-radius-md)', borderTopRightRadius: 'var(--gl-radius-md)', borderBottom: '1px solid var(--gl-border-strong)', padding: '8px 8px 0' }}>
        {TABS.map(t => {
          const on = t.id === active;
          return (
            <div key={t.id} onClick={() => setActive(t.id)}
              style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 16px', height: 40, cursor: 'pointer', borderRadius: '8px 8px 0 0',
                background: on ? 'var(--gl-surface)' : 'transparent', color: on ? 'var(--gl-fg-1)' : 'var(--gl-fg-3)', borderTop: on ? '2px solid var(--gl-blue-500)' : '2px solid transparent', position: 'relative', top: 1 }}>
              <GLIcon name={t.icon} size={15} color={on ? 'var(--gl-blue-500)' : 'currentColor'} />
              <span style={{ fontSize: 13, fontWeight: on ? 600 : 500, whiteSpace: 'nowrap' }}>{t.label}</span>
            </div>
          );
        })}
      </div>
      {/* content */}
      <div style={{ background: 'var(--gl-surface)', borderBottomLeftRadius: 'var(--gl-radius-md)', borderBottomRightRadius: 'var(--gl-radius-md)', border: '1px solid var(--gl-border-strong)', borderTop: 'none' }}>
        {mode === 'keep'
          // IndexedStack: all pages mounted, only active shown → state preserved
          ? <div style={{ display: 'grid' }}>
              {TABS.map(t => <div key={t.id} style={{ gridArea: '1/1', visibility: t.id === active ? 'visible' : 'hidden', pointerEvents: t.id === active ? 'auto' : 'none' }}><TabPage tab={t} mode={mode} /></div>)}
            </div>
          // Rebuild: only the active page exists; remounts every switch → resets
          : <TabPage tab={TABS.find(t => t.id === active)} mode={mode} key={'rebuild-' + active} />}
      </div>
    </div>
  );
}

function StatePanel() {
  const [mode, setMode] = useState('keep');
  return (
    <Panel title={mode === 'keep' ? 'Kept alive (IndexedStack)' : 'Rebuilt on switch (old behaviour)'}
      desc="Type a memo, bump the stepper, scroll the ledger — then switch tabs and come back. In keep-alive mode everything is exactly where you left it and 'Page mounts' stays at 1. In rebuild mode the page remounts: inputs clear, scroll jumps to top, and the mount counter climbs."
      controls={<Segmented value={mode} onChange={setMode} options={[{ value: 'keep', label: 'Keep alive' }, { value: 'rebuild', label: 'Rebuild' }]} />}>
      <Stage flush><TabBarDemo mode={mode} key={mode} /></Stage>
    </Panel>
  );
}

const F_CODE = `// browser_style_tab_bar.dart — build ALL pages once, keep them mounted.
// Switching tabs changes the visible index; the other pages are NOT rebuilt or
// disposed, so each keeps its scroll, input, controllers & expansion state.
final ordered = _ctrl.ordered;
final activeIndex = ordered.indexWhere((t) => t.id == activeTab.id);

final stack = IndexedStack(
  index: activeIndex,
  sizing: StackFit.loose,
  children: [
    for (final t in ordered)
      _KeepAliveTabPage(                       // survives while offstage
        key: ValueKey('keepalive-\${t.id}'),
        child: pageFor(t),                     // scroll view + your page
      ),
  ],
);

// Each page is wrapped in an AutomaticKeepAlive client so it persists even if
// nested in a lazy list:
class _KeepAliveTabPageState extends State<_KeepAliveTabPage>
    with AutomaticKeepAliveClientMixin {
  @override bool get wantKeepAlive => true;
  @override Widget build(BuildContext c) { super.build(c); return widget.child; }
}

// Opt out per host with BrowserStyleTabBar(lazyPages: true) to build only the
// active page (cheaper, but pages reset when revisited). The hover-thumbnail
// RepaintBoundary now wraps the stack — only the visible page paints, so the
// captured frame is always the current tab.`;

function App() {
  const [theme, setTheme] = useTheme();
  return (
    <div style={{ minHeight: '100vh' }}>
      <DemoHeader phase="10" title="Tab state preservation"
        requirement="Switching from one tab to another must not rebuild pages. Preserve each tab's content state, prevent unnecessary re-rendering, and improve performance & UX."
        theme={theme} setTheme={setTheme} />
      <DemoBody>
        <div style={{ marginBottom: 30 }}>
          <Callout title="Leave a tab, come back, find it exactly as you left it." tone="info">
            Each page below holds real state — a memo field, a stepper, a scroll position, and a live “page mounts” counter. Edit them, switch tabs, switch back. In <strong>Keep alive</strong> mode nothing is lost and the mount counter stays at 1. Flip to <strong>Rebuild</strong> to feel the old behaviour: every return remounts the page from scratch.
          </Callout>
        </div>
        <div style={{ marginBottom: 34 }}>
          <FixNote
            before={<>Only the active tab's page was built; switching tabs disposed it and rebuilt the next from scratch. Scroll, form input and controllers were lost on every switch, and revisiting a tab re-ran all its build work.</>}
            after={<>All pages are mounted once in an <code>IndexedStack</code> and kept alive; switching just changes the visible index. State persists, nothing re-renders on switch, and <code>lazyPages: true</code> opts back into the cheap single-page mode.</>} />
        </div>

        <StatePanel />

        <Panel title="Flutter reference" desc="IndexedStack over all ordered tabs, each page wrapped in an AutomaticKeepAlive client. The thumbnail RepaintBoundary wraps the stack so only the visible page paints.">
          <CodeBlock label="IndexedStack + keep-alive" file="navigation/browser_style_tab_bar.dart" code={F_CODE} defaultOpen />
        </Panel>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8, paddingTop: 22, borderTop: '1px solid var(--gl-border)' }}>
          <a href="phase-09-tree-add-remove.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 600, color: 'var(--gl-fg-3)', textDecoration: 'none' }}><GLIcon name="back" size={15} /> Phase 09</a>
          <a href="index.html" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 600, color: 'var(--gl-blue-500)', textDecoration: 'none' }}>All phases <GLIcon name="grid" size={15} /></a>
        </div>
      </DemoBody>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
