const { useTheme, Segmented, DemoHeader, DemoBody, Panel, Stage, Callout, FixNote, CodeBlock, Kbd, Tag } = window;
const { useState, useRef, useEffect, useLayoutEffect, useCallback } = React;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ════════════════════════════════════════════════════════════════════
   ensureVisible — reveal an element inside its scroll viewport on BOTH
   axes. Rect-delta math: dir-agnostic for the vertical axis, and correct
   in RTL too because spec-compliant scrollLeft moves negative as content
   shifts left, matching the sign of the visual delta we add.
   ════════════════════════════════════════════════════════════════════ */
function ensureVisible(vp, el, pad = 10) {
  if (!vp || !el) return;
  const s = vp.getBoundingClientRect(), e = el.getBoundingClientRect();
  // account for a sticky header eating the top of the viewport
  const headTop = (vp.querySelector('[data-sticky]') || {}).getBoundingClientRect
    ? vp.querySelector('[data-sticky]').getBoundingClientRect().height : 0;
  let dy = 0, dx = 0;
  if (e.top < s.top + headTop + pad) dy = e.top - (s.top + headTop + pad);
  else if (e.bottom > s.bottom - pad) dy = e.bottom - (s.bottom - pad);
  if (e.left < s.left + pad) dx = e.left - (s.left + pad);
  else if (e.right > s.right - pad) dx = e.right - (s.right - pad);
  if (dy) vp.scrollTop += dy;
  if (dx) vp.scrollLeft += dx;
}

/* tiny live scroll-offset readout */
function ScrollReadout({ vpRef, axes = 'xy' }) {
  const [o, setO] = useState({ x: 0, y: 0 });
  useEffect(() => {
    const vp = vpRef.current; if (!vp) return;
    const f = () => setO({ x: Math.round(vp.scrollLeft), y: Math.round(vp.scrollTop) });
    f(); vp.addEventListener('scroll', f, { passive: true });
    return () => vp.removeEventListener('scroll', f);
  }, [vpRef]);
  return <span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 11, color: 'var(--gl-fg-3)' }}>
    scroll {axes.includes('x') && <>x:<b style={{ color: 'var(--gl-fg-2)' }}>{o.x}</b>{' '}</>}{axes.includes('y') && <>y:<b style={{ color: 'var(--gl-fg-2)' }}>{o.y}</b></>}
  </span>;
}

/* ─────────────────  ReadableTable — overflow both axes  ───────────────── */

}

function ReadableScrollDemo({ rtl }) {
  const [sel, setSel] = useState({ r: 0, c: 0 });
  const [focused, setFocused] = useState(false);
  const vpRef = useRef(null);
  const nR = RDATA.length, nC = RCOLS.length;
  const cellRef = useRef(null);

  useLayoutEffect(() => { ensureVisible(vpRef.current, cellRef.current); }, [sel, rtl]);

  const onKey = (e) => {
    const k = e.key; let handled = true;
    if (k === 'ArrowRight' || k === 'ArrowLeft') { const d = (k === 'ArrowRight' ? 1 : -1) * (rtl ? -1 : 1); setSel(s => ({ ...s, c: clamp(s.c + d, 0, nC - 1) })); }
    else if (k === 'ArrowDown') setSel(s => ({ ...s, r: clamp(s.r + 1, 0, nR - 1) }));
    else if (k === 'ArrowUp') setSel(s => ({ ...s, r: clamp(s.r - 1, 0, nR - 1) }));
    else if (k === 'Home') setSel(s => ({ ...s, c: 0 }));
    else if (k === 'End') setSel(s => ({ ...s, c: nC - 1 }));
    else if (k === 'PageDown') setSel(s => ({ ...s, r: nR - 1 }));
    else if (k === 'PageUp') setSel(s => ({ ...s, r: 0 }));
    else handled = false;
    if (handled) e.preventDefault();
  };

  const GT = RCOLS.map(c => c.w + 'px').join(' ');
  const totalW = RCOLS.reduce((s, c) => s + c.w, 0);
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, gap: 12, flexWrap: 'wrap' }} dir="ltr">
        <span style={{ fontSize: 12, color: 'var(--gl-fg-3)' }}>{nR} rows × {nC} columns · viewport shows a slice — keyboard focus reveals the rest</span>
        <ScrollReadout vpRef={vpRef} />
      </div>
      <div ref={vpRef} tabIndex={0} className="focusable vp" dir={rtl ? 'rtl' : 'ltr'}
        onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} onKeyDown={onKey}
        style={{ height: 270, overflow: 'auto', border: '1px solid var(--gl-border-strong)', borderRadius: 'var(--gl-radius-md)', position: 'relative', background: 'var(--gl-surface)' }}>
        <div style={{ minWidth: totalW }}>
          {/* sticky header */}
          <div data-sticky style={{ display: 'grid', gridTemplateColumns: GT, position: 'sticky', top: 0, zIndex: 3, background: 'var(--gl-bg)', boxShadow: '0 1px 0 var(--gl-border-strong)' }}>
            {RCOLS.map((c, ci) => (
              <div key={c.k} style={{ padding: '10px 11px', fontSize: 10, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', color: ci === sel.c ? 'var(--gl-blue-500)' : 'var(--gl-fg-3)', textAlign: c.e ? 'end' : c.c ? 'center' : 'start', whiteSpace: 'nowrap', fontFamily: c.ar ? 'var(--gl-font-arabic)' : 'var(--gl-font-body)' }}>{c.label}</div>
            ))}
          </div>
          {RDATA.map((raw, r) => {
            const o = rowObj(raw, r);
            return (
              <div key={r} style={{ display: 'grid', gridTemplateColumns: GT }}>
                {RCOLS.map((c, ci) => {
                  const on = sel.r === r && sel.c === ci;
                  const v = o[c.k];
                  const neg = c.k === 'bal' && String(v).startsWith('−');
                  return (
                    <div key={c.k} ref={on ? cellRef : null} data-active={on ? '1' : undefined} onClick={() => setSel({ r, c: ci })}
                      style={{ height: 38, padding: '0 11px', display: 'flex', alignItems: 'center', justifyContent: c.e ? 'flex-end' : c.c ? 'center' : 'flex-start',
                        borderInlineEnd: '1px solid var(--gl-border)', borderBottom: '1px solid var(--gl-border)',
                        background: on ? 'color-mix(in srgb, var(--gl-blue-500) 12%, var(--gl-surface))' : 'transparent',
                        boxShadow: on ? 'inset 0 0 0 2px var(--gl-blue-500)' : 'none', position: on ? 'relative' : 'static', zIndex: on ? 2 : 1,
                        fontFamily: c.mono ? 'var(--gl-font-mono)' : c.ar ? 'var(--gl-font-arabic)' : 'var(--gl-font-body)', fontSize: 12.5,
                        color: neg ? 'var(--gl-danger-500)' : 'var(--gl-fg-1)', whiteSpace: 'nowrap', cursor: 'pointer' }}>
                      {c.k === 'nat'
                        ? <span style={{ fontSize: 9.5, fontWeight: 700, padding: '2px 7px', borderRadius: 999, color: v === 'DR' ? 'var(--gl-blue-500)' : 'var(--gl-warning-500)', background: `color-mix(in srgb, ${v === 'DR' ? 'var(--gl-blue-500)' : 'var(--gl-warning-500)'} 16%, transparent)` }}>{v}</span>

/* ─────────────────  Tree — tall, vertical reveal  ───────────────── */
const TREE_SRC = (() => {
  const groups = [
    ['1000', 'Assets', 'الأصول', ['Petty Cash', 'Bank · SNB', 'Bank · Al Rajhi', 'Receivables', 'Inventory · Riyadh', 'Inventory · Jeddah', 'Prepaid Rent']],
    ['2000', 'Liabilities', 'الخصوم', ['Payables', 'VAT Payable', 'Accrued Salaries', 'Short-term Loan']],
    ['3000', 'Equity', 'حقوق الملكية', ['Share Capital', 'Retained Earnings']],
    ['4000', 'Revenue', 'الإيرادات', ['Product Sales', 'Service Income', 'Other Income']],
    ['5000', 'Expenses', 'المصروفات', ['COGS', 'Salaries', 'Rent', 'Utilities', 'Marketing', 'Depreciation']],
  ];
  const nodes = [];
  groups.forEach(([code, en, ar, kids], gi) => {
    const gid = 'g' + gi;
    nodes.push({ id: gid, label: en, ar, code, depth: 0, group: true, kids: kids.map((_, ki) => gid + '_' + ki) });
    kids.forEach((kl, ki) => nodes.push({ id: gid + '_' + ki, label: kl, code: `${code.slice(0, 1)}${(ki + 1) * 10 + 10}`, depth: 1 }));
  });
  return nodes;
})();
function TreeScrollDemo({ rtl }) {
  const [expanded, setExpanded] = useState({ g0: true, g1: true, g2: true, g3: true, g4: true });
  const [cursor, setCursor] = useState('g0');
  const [focused, setFocused] = useState(false);
  const vpRef = useRef(null);
  const rowRef = useRef(null);

  const visible = [];
  TREE_SRC.forEach(n => {
    if (n.depth === 0) { visible.push(n); }
    else { const parent = TREE_SRC.find(g => (g.kids || []).includes(n.id)); if (parent && expanded[parent.id]) visible.push(n); }
  });
  const idx = visible.findIndex(n => n.id === cursor);
  const cur = visible[idx];

  useLayoutEffect(() => { ensureVisible(vpRef.current, rowRef.current); }, [cursor, expanded, rtl]);

  const onKey = (e) => {
    const k = e.key; let handled = true;
    if (k === 'ArrowDown') setCursor(visible[clamp(idx + 1, 0, visible.length - 1)].id);
    else if (k === 'ArrowUp') setCursor(visible[clamp(idx - 1, 0, visible.length - 1)].id);
    else if (k === 'Home') setCursor(visible[0].id);
    else if (k === 'End') setCursor(visible[visible.length - 1].id);
    else if (k === 'ArrowRight' || k === 'ArrowLeft') {
      const into = ((k === 'ArrowRight' ? 1 : -1) * (rtl ? -1 : 1)) > 0;
      if (into) { if (cur.group && !expanded[cur.id]) setExpanded(s => ({ ...s, [cur.id]: true })); else { const c2 = visible[idx + 1]; if (c2 && c2.depth > cur.depth) setCursor(c2.id); } }
      else { if (cur.group && expanded[cur.id]) setExpanded(s => ({ ...s, [cur.id]: false })); else { const p = TREE_SRC.find(g => (g.kids || []).includes(cur.id)); if (p) setCursor(p.id); } }
    }
    else if (k === 'Enter' && cur.group) setExpanded(s => ({ ...s, [cur.id]: !s[cur.id] }));
    else handled = false;
    if (handled) e.preventDefault();
  };

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10, gap: 12 }} dir="ltr">
        <span style={{ fontSize: 12, color: 'var(--gl-fg-3)' }}>{visible.length} rows visible · taller than the viewport — focus stays in view</span>
        <ScrollReadout vpRef={vpRef} axes="y" />
      </div>
      <div ref={vpRef} tabIndex={0} className="focusable vp" dir={rtl ? 'rtl' : 'ltr'}
        onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} onKeyDown={onKey}
        style={{ height: 270, overflowY: 'auto', overflowX: 'hidden', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)', background: 'var(--gl-bg)', padding: '6px 0' }}>
        {visible.map(n => {
          const on = n.id === cursor;
          const open = n.group && expanded[n.id];
          return (
            <div key={n.id} ref={on ? rowRef : null} onClick={() => { setCursor(n.id); if (n.group) setExpanded(s => ({ ...s, [n.id]: !s[n.id] })); }}
              style={{ display: 'flex', alignItems: 'center', gap: 9, height: 36, paddingInlineStart: 14 + n.depth * 24, paddingInlineEnd: 14, cursor: 'pointer',
                background: on ? 'color-mix(in srgb, var(--gl-blue-500) 13%, transparent)' : 'transparent',
                boxShadow: on ? 'inset 2px 0 0 var(--gl-blue-500)' : 'none', color: on ? 'var(--gl-fg-1)' : 'var(--gl-fg-2)' }}>
              {n.group
                ? <span style={{ display: 'flex', transform: rtl ? (open ? 'rotate(90deg)' : 'rotate(180deg)') : (open ? 'rotate(90deg)' : 'none'), transition: 'transform var(--gl-dur-base)', color: 'var(--gl-fg-3)' }}><GLIcon name="chevR" size={14} /></span>
                : <span style={{ width: 14 }} />}
              <GLIcon name={n.group ? (open ? 'folderOpen' : 'folder') : 'doc'} size={15} color={on ? 'var(--gl-blue-500)' : 'var(--gl-fg-3)'} />
              <span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 11, color: 'var(--gl-fg-4)', minWidth: 38 }}>{n.code}</span>
              <span style={{ fontSize: 13, fontWeight: on ? 600 : 500 }}>{n.label}</span>
              {n.ar && <span style={{ fontFamily: 'var(--gl-font-arabic)', fontSize: 12.5, color: 'var(--gl-fg-3)', marginInlineStart: 'auto' }}>{n.ar}</span>}
            </div>
          );
        })}
      </div>
      <div style={{ marginTop: 11, fontSize: 12.5, color: 'var(--gl-fg-3)', lineHeight: 1.5 }} dir="ltr">
        On <strong style={{ color: 'var(--gl-fg-1)' }}>{cur ? cur.label : '—'}</strong>. <Kbd>↑</Kbd><Kbd>↓</Kbd> move, <Kbd>Home</Kbd>/<Kbd>End</Kbd> jump — the row never leaves the viewport, even at the far ends.
      </div>
    </div>
  );
}

/* ─────────────────  Flutter reference  ───────────────── */
const F_READABLE = `// readable_table.dart — a GlobalKey rides the active row/cell:
final GlobalKey _activeKey = GlobalKey();

// …attached during build to whichever cell/row is active…
return _sizedCell(col: col,
  child: cellActive ? KeyedSubtree(key: _activeKey, child: box) : box);

// On every active-position change (from _onControllerChanged) reveal it.
// Scrollable.ensureVisible walks up through EVERY enclosing Scrollable, so a
// single call handles a vertical row scroller AND a horizontal column scroller.
// The two policies scroll only as far as needed — and are RTL-correct for free.
void _ensureActiveVisible() {
  WidgetsBinding.instance.addPostFrameCallback((_) {
    final ctx = _activeKey.currentContext;
    if (!mounted || ctx == null) return;
    const d = Duration(milliseconds: 160), c = Curves.easeOutCubic;
    Scrollable.ensureVisible(ctx,
        alignmentPolicy: ScrollPositionAlignmentPolicy.keepVisibleAtEnd,   duration: d, curve: c);
    Scrollable.ensureVisible(ctx,
        alignmentPolicy: ScrollPositionAlignmentPolicy.keepVisibleAtStart, duration: d, curve: c);
  });
}`;
const F_TREE = `// tree.dart — _scrollToFocused() is now also called from the ← / → branch,
// so expanding into a deep child (or stepping out to a far-up parent) reveals
// the focus too — not just ↑ / ↓ / Home / End.
case LogicalKeyboardKey.arrowRight:
case LogicalKeyboardKey.arrowLeft:
  arrowGoesInto(k, Directionality.of(context))
      ? _controller.focusInto()
      : _controller.focusOut();
  _scrollToFocused();              // ← added
  return KeyEventResult.handled;`;

function App() {
  const [theme, setTheme] = useTheme();
  const [dir, setDir] = useState('ltr');
  const rtl = dir === 'rtl';
  return (
    <div style={{ minHeight: '100vh' }}>
      <DemoHeader phase="02" title="Scroll-on-focus"
        requirement="When a cell or row is focused via the keyboard, ReadableTable & Tree scroll it into view — covering grids and trees with more rows or columns than fit on screen."
        theme={theme} setTheme={setTheme}
        right={<Segmented value={dir} onChange={setDir} options={[{ value: 'ltr', label: 'LTR' }, { value: 'rtl', label: 'RTL · عربي' }]} ariaLabel="Direction" />} />
      <DemoBody>
        <div style={{ marginBottom: 30 }}>
          <Callout title="Focus should never hide off-screen." tone="info">
            Each grid below is deliberately larger than its viewport. Click into one, then drive it with the arrow keys — the active row/cell is always pulled back into view, including across the horizontal axis when columns overflow, and correctly in RTL.
          </Callout>
        </div>

        <div style={{ marginBottom: 34 }}>
          <FixNote
            before={<>ReadableTable had <em>no</em> scroll-on-focus — keyboard nav could move the highlight to a row or column completely outside the viewport, with nothing to tell the user where they were. The Tree only revealed focus on <Kbd>↑</Kbd>/<Kbd>↓</Kbd>, not when <Kbd>→</Kbd> stepped into a deep child.</>}
            after={<>A key parked on the active cell drives <code>Scrollable.ensureVisible</code> across every enclosing scroller — both axes, RTL-correct. The Tree now reveals focus on expand / step too.</>} />
        </div>

        <Panel title="A · ReadableTable — overflow on both axes" desc="16 rows × 9 columns inside a fixed viewport with a sticky header. Keyboard focus reveals off-screen rows and columns; the live scroll readout proves the viewport is moving.">
          <Stage><ReadableScrollDemo rtl={rtl} /></Stage>
        </Panel>

        <Panel title="B · Tree — taller than the viewport" desc="A full chart of accounts in a short viewport. The focused row is always pulled into view, including when ← / → expand into a child far below or step out to a parent far above.">
          <Stage><TreeScrollDemo rtl={rtl} /></Stage>
        </Panel>

        <Panel title="Flutter reference" desc="Both use Flutter's built-in viewport-reveal — no hand-rolled offset math, so it stays correct under variable row heights and nested scrollables.">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <CodeBlock label="ReadableTable · ensureVisible on active change" file="data/readable_table.dart" code={F_READABLE} defaultOpen />
            <CodeBlock label="Tree · scroll on expand / step" file="data/tree.dart" code={F_TREE} />
          </div>
