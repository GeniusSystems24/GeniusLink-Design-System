<!DOCTYPE html><html><head><meta charset="utf-8"><title>Bilingual</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div>
      <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-2);margin-bottom:8px">Name English <span style="color:#EF4444">*</span></div>
      <div style="height:40px;padding:0 16px;display:flex;align-items:center;background:var(--gl-input-bg);border:1px solid var(--gl-border-strong);border-radius:4px;font-size:14px;color:var(--gl-fg-3)">e.g. Downtown Central Store</div>
    </div>
    <div dir="rtl">
      <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-2);margin-bottom:8px">الاسم بالعربية <span style="color:#EF4444">*</span></div>
      <div style="height:40px;padding:0 16px;display:flex;align-items:center;justify-content:flex-start;background:var(--gl-input-bg);border:1px solid var(--gl-border-strong);border-radius:4px;font-family:var(--gl-font-arabic);font-size:14px;color:var(--gl-fg-3)">مثال: متجر وسط المدينة الرئيسي</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">English LTR on the left · Arabic RTL on the right · always paired in a 2-column grid.</div>
</div>
</body></html>
