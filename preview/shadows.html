<!DOCTYPE html><html><head><meta charset="utf-8"><title>Shadows & Elevation</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
    <div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-bottom:14px">DARK · card shadow</div>
      <div style="height:90px;background:#1E2025;border:1px solid var(--gl-border);border-radius:8px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)"></div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-top:10px">0 25px 50px −12px rgba(0,0,0,.25)</div>
    </div>
    <div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-bottom:14px">LIGHT · card shadow</div>
      <div style="height:90px;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:8px;box-shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px -12px rgba(15,23,42,.12)"></div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-top:10px">0 1px 2px, 0 8px 24px −12px slate</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">Cards lift; everything else sits flat. No inner shadows. No emboss.</div>
</div>
</body></html>
