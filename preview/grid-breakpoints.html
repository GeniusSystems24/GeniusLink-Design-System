<!DOCTYPE html><html><head><meta charset="utf-8"><title>Grid & Breakpoints</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:64px;font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">sm</div>
      <div style="height:14px;width:30%;background:#33353A;border-radius:3px"></div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">480px</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:64px;font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">md ★</div>
      <div style="height:14px;width:48%;background:#4A7CFF;border-radius:3px"></div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:#4A7CFF">768px · tables→cards</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:64px;font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">lg</div>
      <div style="height:14px;width:66%;background:#33353A;border-radius:3px"></div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">1024px</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:64px;font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">xl</div>
      <div style="height:14px;width:84%;background:#33353A;border-radius:3px"></div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">1280px</div>
    </div>
  </div>
  <div style="display:flex;gap:24px;font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    <span>content 720 (forms)</span><span>content-wide 1120 (dashboards)</span><span>gutter 24</span>
  </div>
</div>
</body></html>
