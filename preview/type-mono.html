<!DOCTYPE html><html><head><meta charset="utf-8"><title>Mono — JetBrains Mono</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:160px 1fr;row-gap:12px;column-gap:24px;align-items:baseline;font-family:var(--gl-font-mono)">
    <div style="font-size:11px;color:var(--gl-fg-3)">Serial / reference</div>
    <div style="font-size:14px;color:var(--gl-fg-1)">JV-2024-0042</div>
    <div style="font-size:11px;color:var(--gl-fg-3)">Truncated hash</div>
    <div style="font-size:14px;color:var(--gl-fg-1)">a7f8…b161</div>
    <div style="font-size:11px;color:var(--gl-fg-3)">Currency</div>
    <div style="font-size:14px;color:var(--gl-fg-1)">$5,240.00</div>
    <div style="font-size:11px;color:var(--gl-fg-3)">Positive delta</div>
    <div style="font-size:14px;color:#1DB88A">+5,000.00</div>
    <div style="font-size:11px;color:var(--gl-fg-3)">Negative delta</div>
    <div style="font-size:14px;color:#EF4444">−5,000.00</div>
    <div style="font-size:11px;color:var(--gl-fg-3)">Timestamp</div>
    <div style="font-size:14px;color:var(--gl-fg-1)">2025-12-15 14:22:15</div>
  </div>
</div>
</body></html>
