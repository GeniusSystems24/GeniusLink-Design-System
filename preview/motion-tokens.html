<!DOCTYPE html><html><head><meta charset="utf-8"><title>Motion Tokens</title><link rel="stylesheet" href="_base.css">
<style>
  .track { position: relative; height: 30px; background: var(--gl-dark-bg); border: 1px solid var(--gl-border); border-radius: 6px; overflow: hidden; cursor: pointer; }
  .dot { position: absolute; top: 50%; left: 4px; width: 22px; height: 22px; margin-top: -11px; border-radius: 6px; background: #4A7CFF; }
  .run .dot { left: calc(100% - 26px); }
</style>
</head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:120px 1fr 70px;gap:12px 16px;align-items:center">
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">fast</div>
    <div class="track" data-d="100"><div class="dot"></div></div>
    <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">100ms</div>
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">base ★</div>
    <div class="track" data-d="150"><div class="dot"></div></div>
    <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">150ms</div>
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">moderate</div>
    <div class="track" data-d="200"><div class="dot"></div></div>
    <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">200ms</div>
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-2)">slow</div>
    <div class="track" data-d="300"><div class="dot"></div></div>
    <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">300ms</div>
  </div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    <span>standard cubic-bezier(.4,0,.2,1)</span><span>out (enter)</span><span>in (exit)</span><span>emphasized (sheets)</span>
  </div>
</div>
<script>
  const tracks = [...document.querySelectorAll('.track')];
  function play(){ tracks.forEach((t,i)=>{ const d=+t.dataset.d; t.querySelector('.dot').style.transition=`left ${d}ms cubic-bezier(.4,0,.2,1)`; setTimeout(()=>t.classList.add('run'), 200+i*120); setTimeout(()=>{t.classList.remove('run');}, 1600); }); }
  document.querySelector('.card').addEventListener('click', play);
  setTimeout(play, 400); setInterval(play, 2600);
</script>
</body></html>
