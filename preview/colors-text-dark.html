<!DOCTYPE html><html><head><meta charset="utf-8"><title>Text — Dark</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:160px 1fr;row-gap:14px;column-gap:24px;align-items:baseline">
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">fg-1 · #E2E2E9</div>
    <div style="font-size:16px;font-weight:700;color:#E2E2E9">Primary — headings and key values</div>
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">fg-2 · #C3C6D7</div>
    <div style="font-size:14px;color:#C3C6D7">Secondary — body, form labels (uppercase)</div>
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">fg-3 · #8D90A0</div>
    <div style="font-size:13px;color:#8D90A0">Tertiary — captions, placeholder, dim metadata</div>
    <div style="font-family:var(--gl-font-mono);font-size:11px;color:var(--gl-fg-3)">fg-4 · #44474E</div>
    <div style="font-size:13px;color:#44474E">Disabled · footer micro-copy</div>
  </div>
</div>
