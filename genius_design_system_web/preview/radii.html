<!DOCTYPE html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(6, 1fr);gap:14px;align-items:end">
    <div style="text-align:center"><div style="height:64px;background:var(--gl-input-bg);border:1px solid var(--gl-border);border-radius:2px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px">2 · xs</div></div>
    <div style="text-align:center"><div style="height:64px;background:var(--gl-input-bg);border:1px solid var(--gl-border);border-radius:4px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px">4 · sm ★</div></div>
    <div style="text-align:center"><div style="height:64px;background:var(--gl-input-bg);border:1px solid var(--gl-border);border-radius:6px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px">6 · md</div></div>
    <div style="text-align:center"><div style="height:64px;background:var(--gl-input-bg);border:1px solid var(--gl-border);border-radius:8px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px">8 · lg ★</div></div>
    <div style="text-align:center"><div style="height:64px;background:var(--gl-input-bg);border:1px solid var(--gl-border);border-radius:12px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px">12 · xl</div></div>
    <div style="text-align:center"><div style="height:64px;background:var(--gl-input-bg);border:1px solid var(--gl-border);border-radius:999px"></div><div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-2);margin-top:8px">999 · pill</div></div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">★ sm for inputs/buttons; lg for cards. Pill only for status badges and section markers.</div>
</div>
</body></html>
