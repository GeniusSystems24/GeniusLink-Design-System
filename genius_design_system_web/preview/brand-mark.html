<!DOCTYPE html><html><head><meta charset="utf-8"><title>Brand Mark</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--gl-border);border-radius:8px;overflow:hidden;border:1px solid var(--gl-border)">
    <div style="background:#1E2025;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <img src="../assets/logo-mark-white.png" alt="GeniusLink mark on dark" style="width:56px;height:56px;object-fit:contain"/>
      <div style="display:flex;align-items:center;gap:10px">
        <img src="../assets/logo-mark.png" alt="GeniusLink mark color" style="width:24px;height:24px;object-fit:contain"/>
        <span style="font-family:var(--gl-font-display);font-weight:800;font-size:18px;color:#E2E2E9;letter-spacing:-0.01em">GeniusLink</span>
      </div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3)">on dark · #1E2025</div>
    </div>
    <div style="background:#FFFFFF;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <img src="../assets/logo-mark.png" alt="GeniusLink mark color" style="width:56px;height:56px;object-fit:contain"/>
      <div style="display:flex;align-items:center;gap:10px">
        <img src="../assets/logo-mark.png" alt="GeniusLink mark color" style="width:24px;height:24px;object-fit:contain"/>
        <span style="font-family:var(--gl-font-display);font-weight:800;font-size:18px;color:#0F172A;letter-spacing:-0.01em">GeniusLink</span>
      </div>
      <div style="font-family:var(--gl-font-mono);font-size:10px;color:#64748B">on light · #FFFFFF</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">Isometric cube mark with violet accent face · paired with Manrope ExtraBold wordmark.</div>
</div>
</body></html>
