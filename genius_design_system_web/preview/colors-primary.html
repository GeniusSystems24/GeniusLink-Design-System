<!DOCTYPE html><html><head><meta charset="utf-8"><title>Primary Blue</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#F0F2FF;border-color:#DDE2F1"></div><div class="name">blue-50</div><div class="hex">#F0F2FF</div></div>
    <div class="swatch"><div class="chip" style="background:#DDE2F1"></div><div class="name">blue-100</div><div class="hex">#DDE2F1</div></div>
    <div class="swatch"><div class="chip" style="background:#ADC6FF"></div><div class="name">blue-200</div><div class="hex">#ADC6FF</div></div>
    <div class="swatch"><div class="chip" style="background:#4A7CFF;box-shadow:0 6px 20px -6px rgba(74,124,255,.6)"></div><div class="name" style="color:#E2E2E9">blue-500 ★</div><div class="hex">#4A7CFF</div></div>
    <div class="swatch"><div class="chip" style="background:#005AC2"></div><div class="name">blue-700</div><div class="hex">#005AC2</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid var(--gl-border)">
    <div style="font-size:12px;color:var(--gl-fg-3)">★ The single dominant accent. Used for primary buttons, section markers, breadcrumbs, focus rings.</div>
  </div>
</div>
</body></html>
