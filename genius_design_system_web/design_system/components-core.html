<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — Core Components</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--gl-font-body); }
  ::-webkit-scrollbar { width: 9px; height: 9px; } ::-webkit-scrollbar-thumb { background: var(--gl-border-strong); border-radius: 5px; } ::-webkit-scrollbar-track { background: transparent; }
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><rect x="22" y="30" width="34" height="13" rx="4" fill="#4A7CFF"/><rect x="22" y="50" width="56" height="8" rx="3" fill="#33353A"/><rect x="22" y="63" width="44" height="8" rx="3" fill="#33353A"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ds-kit.jsx"></script>
<script type="text/babel">
const { GLIcon, DSButton, DSIconButton, DSSpinner, DSField, DSSearch, DSPill, DSBadge, DSChip, DSAvatar, DSCard, DSListTile, DSDivider, Shell, Section, Spec } = window;

/* composite mocks */
function MiniDialog() {
  return (
    <div style={{ width: '100%', borderRadius: 'var(--gl-radius-lg)', overflow: 'hidden', border: '1px solid var(--gl-border-strong)', background: 'var(--gl-surface)', boxShadow: 'var(--gl-shadow)' }}>
      <div style={{ padding: '18px 18px 8px' }}>
        <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--gl-fg-1)' }}>Delete account 1200?</div>
        <div style={{ fontSize: 13, color: 'var(--gl-fg-3)', marginTop: 8, lineHeight: 1.5 }}>This permanently removes the account and its postings. This action is recorded in the audit log.</div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, padding: 14, borderTop: '1px solid var(--gl-border)' }}>
        <DSButton variant="secondary" size="sm">Cancel</DSButton><DSButton variant="danger" size="sm" icon="trash">Delete</DSButton>
      </div>
    </div>
  );
}
function MiniSheet() {
  return (
    <div style={{ width: '100%', borderRadius: '12px 12px 0 0', border: '1px solid var(--gl-border-strong)', borderBottom: 'none', background: 'var(--gl-surface)', padding: 16 }}>
      <div style={{ width: 36, height: 4, borderRadius: 999, background: 'var(--gl-border-strong)', margin: '0 auto 14px' }} />
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10, color: 'var(--gl-fg-1)' }}>Choose currency</div>
      {['SAR — Saudi Riyal', 'USD — US Dollar', 'EUR — Euro'].map((o, i) => <div key={o}><DSListTile icon="check" title={o} trailing={i === 0 ? <DSPill tone="info">Active</DSPill> : null} />{i < 2 && <DSDivider />}</div>)}
    </div>
  );
}
function Snackbar({ tone, icon, text }) {
  const c = { success: 'var(--gl-success-500)', danger: 'var(--gl-danger-500)', info: 'var(--gl-blue-500)' }[tone];
  return <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px', background: 'var(--gl-surface)', border: '1px solid var(--gl-border-strong)', borderLeft: `3px solid ${c}`, borderRadius: 'var(--gl-radius-sm)', boxShadow: 'var(--gl-shadow)', width: '100%' }}><span style={{ color: c, display: 'flex' }}><GLIcon name={icon} size={15} /></span><span style={{ fontSize: 13, color: 'var(--gl-fg-1)', flex: 1 }}>{text}</span><span style={{ color: 'var(--gl-blue-500)', fontSize: 12, fontWeight: 700 }}>UNDO</span></div>;
}
function MiniAppBar() {
  return <div style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)' }}><GLIcon name="back" size={20} color="var(--gl-blue-500)" /><span style={{ fontFamily: 'var(--gl-font-display)', fontWeight: 700, fontSize: 17, flex: 1 }}>Create Store</span><DSIconButton icon="dots" size={32} /></div>;
}
function MiniNav() {
  const items = [['home', 'Home', 1], ['grid', 'Accounts'], ['search', 'Search'], ['user', 'Profile']];
  return <div style={{ width: '100%', display: 'flex', padding: '8px 4px', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)' }}>{items.map(([ic, l, on]) => <div key={l} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, color: on ? 'var(--gl-blue-500)' : 'var(--gl-fg-3)' }}><GLIcon name={ic === 'grid' ? 'grid' : ic === 'search' ? 'searchO' : ic} size={20} /><span style={{ fontSize: 10, fontWeight: on ? 700 : 500 }}>{l}</span></div>)}</div>;
}
function MiniMenu() {
  return <div style={{ width: 200, background: 'var(--gl-surface)', border: '1px solid var(--gl-border-strong)', borderRadius: 'var(--gl-radius-md)', boxShadow: 'var(--gl-shadow)', padding: 6 }}>{[['edit', 'Edit'], ['doc', 'Duplicate'], ['lock', 'Lock period']].map(([ic, l]) => <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 4, fontSize: 13, color: 'var(--gl-fg-1)', cursor: 'pointer' }}><GLIcon name={ic} size={16} color="var(--gl-fg-3)" />{l}</div>)}<DSDivider /><div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', borderRadius: 4, fontSize: 13, color: 'var(--gl-danger-500)', cursor: 'pointer' }}><GLIcon name="trash" size={16} />Delete</div></div>;
}
function StateView({ icon, title, body, action, tone = 'neutral' }) {
  const c = { neutral: 'var(--gl-fg-3)', danger: 'var(--gl-danger-500)', warning: 'var(--gl-warning-500)' }[tone];
  return (
    <div style={{ width: '100%', textAlign: 'center', padding: '28px 18px', background: 'var(--gl-bg)', border: '1px dashed var(--gl-border-strong)', borderRadius: 'var(--gl-radius-lg)' }}>
      <div style={{ width: 48, height: 48, borderRadius: 999, background: `color-mix(in srgb, ${c} 14%, transparent)`, color: c, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}><GLIcon name={icon} size={24} /></div>
      <div style={{ fontWeight: 700, fontSize: 15, color: 'var(--gl-fg-1)' }}>{title}</div>
      <div style={{ fontSize: 12.5, color: 'var(--gl-fg-3)', marginTop: 6, lineHeight: 1.5, maxWidth: 240, marginInline: 'auto' }}>{body}</div>
      {action && <div style={{ marginTop: 16 }}>{action}</div>}
    </div>
  );
}

function App() {
  return (
    <Shell title="Core Components" subtitle="GeniusLink Design System · V2 Stage B">
      <Section title="Buttons" desc="Primary · Secondary · Danger · Ghost — with hover, pressed, disabled and loading states. 44px min touch target.">
        <Spec label="Variants"><DSButton variant="primary" icon="plus">Create</DSButton><DSButton variant="secondary">Cancel</DSButton><DSButton variant="danger" icon="trash">Delete</DSButton><DSButton variant="ghost" icon="chevR">More</DSButton></Spec>
        <Spec label="States · primary"><DSButton>Default</DSButton><DSButton state="hover">Hover</DSButton><DSButton state="pressed">Pressed</DSButton><DSButton state="disabled">Disabled</DSButton></Spec>
        <Spec label="Loading · sizes"><DSButton loading>Posting…</DSButton><DSButton size="sm" variant="secondary">Small</DSButton></Spec>
      </Section>

      <Section title="Icon Buttons">
        <Spec label="Neutral / Danger"><DSIconButton icon="edit" /><DSIconButton icon="dots" /><DSIconButton icon="trash" variant="danger" /><DSIconButton icon="edit" state="disabled" /></Spec>
      </Section>

      <Section title="Text & Search Fields" desc="Default · Focused · Error · Disabled. Bilingual (English LTR, Arabic RTL).">
        <Spec label="States" span={2}><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, width: '100%' }}><DSField label="Default" placeholder="e.g. Cash Box" /><DSField label="Focused" value="Cash Box" state="focused" /><DSField label="Error" value="" state="error" /><DSField label="Disabled" value="Locked" state="disabled" /></div></Spec>
        <Spec label="Arabic (RTL)"><div style={{ width: '100%' }}><DSField label="الاسم بالعربية" value="الأصول المتداولة" dir="rtl" /></div></Spec>
        <Spec label="Search"><div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}><DSSearch /><DSSearch value="downtown" /></div></Spec>
      </Section>

      <Section title="Cards · List Tiles · Dividers" cols="repeat(auto-fill, minmax(300px, 1fr))">
        <Spec label="Card + list"><DSCard pad={8}><div style={{ padding: '0 8px' }}><DSListTile avatar="Layla Ahmed" title="Layla Ahmed" sub="Accountant" trailing={<DSPill tone="success">Active</DSPill>} /><DSDivider /><DSListTile icon="ledger" title="Cash Box" sub="1001 · Asset" trailing={<GLIcon name="chevR" size={16} color="var(--gl-fg-3)" />} /></div></DSCard></Spec>
      </Section>

      <Section title="Avatars · Badges · Chips">
        <Spec label="Avatars"><DSAvatar name="Layla Ahmed" size={28} /><DSAvatar name="Khalid Saleh" size={36} color="var(--gl-blue-500)" /><DSAvatar name="Admin User" size={44} /></Spec>
        <Spec label="Badges"><span style={{ position: 'relative', display: 'inline-flex' }}><DSIconButton icon="bell" /><span style={{ position: 'absolute', top: -4, right: -4 }}><DSBadge count={3} /></span></span><DSBadge count={12} /><DSBadge dot /></Spec>
        <Spec label="Chips"><DSChip icon="calendar">Filter</DSChip><DSChip selected>Selected</DSChip><DSChip removable>Riyadh</DSChip></Spec>
      </Section>

      <Section title="Dialog · Bottom Sheet · Snackbar" cols="repeat(auto-fill, minmax(280px, 1fr))">
        <Spec label="Confirmation dialog"><MiniDialog /></Spec>
        <Spec label="Bottom sheet"><MiniSheet /></Spec>
        <Spec label="Snackbars"><div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}><Snackbar tone="success" icon="check" text="Entry posted" /><Snackbar tone="danger" icon="alert" text="Failed to send" /></div></Spec>
      </Section>

      <Section title="App Bar · Nav Bar · Toolbar · Menu" cols="repeat(auto-fill, minmax(280px, 1fr))">
        <Spec label="App bar"><MiniAppBar /></Spec>
        <Spec label="Bottom nav bar"><MiniNav /></Spec>
        <Spec label="Overflow menu"><MiniMenu /></Spec>
      </Section>

      <Section title="State Views" desc="Empty · Error · Loading · Not Allowed · Not Found — reusable full-screen states." cols="repeat(auto-fill, minmax(260px, 1fr))">
        <Spec label="Empty"><StateView icon="inbox" title="No entries yet" body="Posted journal entries will appear here." action={<DSButton size="sm" icon="plus">New Entry</DSButton>} /></Spec>
        <Spec label="Error"><StateView icon="alert" tone="danger" title="Something went wrong" body="We couldn't load this ledger. Try again." action={<DSButton size="sm" variant="secondary">Retry</DSButton>} /></Spec>
        <Spec label="Loading"><div style={{ width: '100%', textAlign: 'center', padding: '40px 18px', background: 'var(--gl-bg)', border: '1px dashed var(--gl-border-strong)', borderRadius: 'var(--gl-radius-lg)' }}><DSSpinner size={28} /><div style={{ fontSize: 13, color: 'var(--gl-fg-3)', marginTop: 14 }}>Loading…</div></div></Spec>
        <Spec label="Not allowed"><StateView icon="ban" tone="warning" title="No access" body="You don't have permission to view this module." /></Spec>
        <Spec label="Not found"><StateView icon="ghost" title="404 — Not found" body="This record may have been moved or deleted." action={<DSButton size="sm" variant="secondary" icon="back">Go back</DSButton>} /></Spec>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
