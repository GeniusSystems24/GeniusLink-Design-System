<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — Charts</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; } body { font-family: var(--gl-font-body); }
  ::-webkit-scrollbar { width: 9px; height: 9px; } ::-webkit-scrollbar-thumb { background: var(--gl-border-strong); border-radius: 5px; }
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><polyline points="16,64 34,48 50,56 68,32 84,40" fill="none" stroke="#4A7CFF" stroke-width="3"/><rect x="16" y="72" width="68" height="3" fill="#33353A"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ds-kit.jsx"></script>
<script type="text/babel">
const { GLIcon, DSButton, DSSpinner, DSPill, Shell, Section, Spec } = window;
const BLUE = 'var(--gl-blue-500)', GREEN = 'var(--gl-success-500)', ORANGE = 'var(--gl-warning-500)', RED = 'var(--gl-danger-500)';

function ChartFrame({ title, legend, children }) {
  return (
    <div style={{ width: '100%' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <span style={{ fontWeight: 700, fontSize: 13, color: 'var(--gl-fg-1)' }}>{title}</span>
        {legend && <div style={{ display: 'flex', gap: 12 }}>{legend.map(([c, l]) => <span key={l} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11, color: 'var(--gl-fg-3)' }}><span style={{ width: 9, height: 9, borderRadius: 2, background: c }} />{l}</span>)}</div>}
      </div>
      {children}
    </div>
  );
}

/* axis labels helper */
function YAxis({ children }) { return <div style={{ display: 'flex', flexDirection: 'column', justifyContent: 'space-between', fontFamily: 'var(--gl-font-mono)', fontSize: 9, color: 'var(--gl-fg-3)', paddingRight: 8, textAlign: 'right' }}>{children}</div>; }

function LineArea({ area }) {
  const data = [62, 71, 58, 80, 74, 92, 88, 96, 104, 98, 112, 120];
  const max = 130; const W = 320, H = 150;
  const pts = data.map((v, i) => [12 + (i * (W - 24) / (data.length - 1)), H - 14 - (v / max) * (H - 28)]);
  const line = pts.map(p => p.join(',')).join(' ');
  const areaPts = `12,${H - 14} ${line} ${W - 12},${H - 14}`;
  const [hi, setHi] = React.useState(7);
  return (
    <ChartFrame title="Net cash flow · SAR k" legend={[[BLUE, '2024']]}>
      <div style={{ display: 'flex' }}>
        <YAxis><span>130</span><span>65</span><span>0</span></YAxis>
        <div style={{ flex: 1, position: 'relative' }}>
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} preserveAspectRatio="none" style={{ display: 'block' }}>
            {[0.5, 1].map(g => <line key={g} x1="12" x2={W - 12} y1={14 + g * (H - 28)} y2={14 + g * (H - 28)} stroke="var(--gl-border)" strokeWidth="1" />)}
            {area && <polygon points={areaPts} fill={BLUE} opacity="0.14" />}
            <polyline points={line} fill="none" stroke={BLUE} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
            {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={i === hi ? 4 : 0} fill={BLUE} stroke="var(--gl-surface)" strokeWidth="2" onMouseEnter={() => setHi(i)} />)}
            {pts.map((p, i) => <rect key={'h' + i} x={p[0] - 12} y="0" width="24" height={H} fill="transparent" onMouseEnter={() => setHi(i)} />)}
          </svg>
          {hi != null && <div style={{ position: 'absolute', left: `${(pts[hi][0] / W) * 100}%`, top: pts[hi][1] - 34, transform: 'translateX(-50%)', background: 'var(--gl-fg-1)', color: 'var(--gl-bg)', fontFamily: 'var(--gl-font-mono)', fontSize: 10, fontWeight: 700, padding: '3px 7px', borderRadius: 4, whiteSpace: 'nowrap', pointerEvents: 'none' }}>{data[hi]}k</div>}
          <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'var(--gl-font-mono)', fontSize: 9, color: 'var(--gl-fg-3)', marginTop: 4, padding: '0 8px' }}><span>Jan</span><span>Apr</span><span>Jul</span><span>Oct</span><span>Dec</span></div>
        </div>
      </div>
    </ChartFrame>
  );
}

function BarChart() {
  const data = [['Q1', 48, 62], ['Q2', 55, 80], ['Q3', 70, 96], ['Q4', 74, 112]];
  const max = 120;
  return (
    <ChartFrame title="Debits vs Credits · SAR k" legend={[[ORANGE, 'Out'], [BLUE, 'In']]}>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 18, height: 150, padding: '0 4px' }}>
        {data.map(([q, out, inn]) => (
          <div key={q} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, height: '100%' }}>
            <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: 5 }}>
              <div title={out + 'k'} style={{ width: 14, height: `${(out / max) * 100}%`, background: ORANGE, borderRadius: '3px 3px 0 0', transition: 'height var(--gl-dur-moderate)' }} />
              <div title={inn + 'k'} style={{ width: 14, height: `${(inn / max) * 100}%`, background: BLUE, borderRadius: '3px 3px 0 0', transition: 'height var(--gl-dur-moderate)' }} />
            </div>
            <span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 10, color: 'var(--gl-fg-3)' }}>{q}</span>
          </div>
        ))}
      </div>
    </ChartFrame>
  );
}

function Donut() {
  const segs = [['Assets', 48, BLUE], ['Liabilities', 22, ORANGE], ['Equity', 30, GREEN]];
  let acc = 0; const stops = segs.map(([l, v, c]) => { const s = acc; acc += v; return `${c} ${s}% ${acc}%`; }).join(', ');
  return (
    <ChartFrame title="Balance composition">
      <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
        <div style={{ width: 130, height: 130, borderRadius: '50%', background: `conic-gradient(${stops})`, position: 'relative', flexShrink: 0 }}>
          <div style={{ position: 'absolute', inset: 22, borderRadius: '50%', background: 'var(--gl-surface)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}><span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 18, fontWeight: 700, color: 'var(--gl-fg-1)' }}>426k</span><span style={{ fontSize: 9, color: 'var(--gl-fg-3)', textTransform: 'uppercase', letterSpacing: '.06em' }}>Total</span></div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {segs.map(([l, v, c]) => <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12.5, color: 'var(--gl-fg-2)' }}><span style={{ width: 10, height: 10, borderRadius: 3, background: c }} />{l}<span style={{ fontFamily: 'var(--gl-font-mono)', color: 'var(--gl-fg-1)', fontWeight: 600, marginLeft: 4 }}>{v}%</span></div>)}
        </div>
      </div>
    </ChartFrame>
  );
}

function ProgressRing({ pct = 72, label, color = GREEN }) {
  const R = 34, C = 2 * Math.PI * R;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
      <div style={{ position: 'relative', width: 84, height: 84 }}>
        <svg width="84" height="84" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="42" cy="42" r={R} fill="none" stroke="var(--gl-input-bg)" strokeWidth="8" />
          <circle cx="42" cy="42" r={R} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C * (1 - pct / 100)} style={{ transition: 'stroke-dashoffset var(--gl-dur-slow)' }} />
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'var(--gl-font-mono)', fontSize: 17, fontWeight: 700, color: 'var(--gl-fg-1)' }}>{pct}%</div>
      </div>
      <span style={{ fontSize: 11, color: 'var(--gl-fg-3)' }}>{label}</span>
    </div>
  );
}

function KpiSpark({ label, value, delta, up }) {
  const d = [6, 9, 7, 12, 10, 14, 13, 17]; const max = 18, W = 110, H = 34;
  const pts = d.map((v, i) => `${i * (W / (d.length - 1))},${H - (v / max) * H}`).join(' ');
  return (
    <div style={{ width: '100%', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)', padding: 16 }}>
      <div style={{ fontWeight: 700, fontSize: 10, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--gl-fg-3)' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginTop: 10 }}>
        <div><div style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 22, fontWeight: 700, color: 'var(--gl-fg-1)' }}>{value}</div><div style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 11, color: up ? GREEN : RED, marginTop: 3 }}>{up ? '▲' : '▼'} {delta}</div></div>
        <svg viewBox={`0 0 ${W} ${H}`} width="110" height="34"><polyline points={pts} fill="none" stroke={up ? GREEN : RED} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
      </div>
    </div>
  );
}

/* states */
function ChartLoading() { return <div style={{ width: '100%' }}><div style={{ fontWeight: 700, fontSize: 13, marginBottom: 14, color: 'var(--gl-fg-1)' }}>Revenue trend</div><div style={{ height: 150, borderRadius: 8, background: 'linear-gradient(90deg, var(--gl-input-bg) 25%, var(--gl-hover) 37%, var(--gl-input-bg) 63%)', backgroundSize: '400% 100%', animation: 'dsshimmer-bg 1.4s ease infinite' }} /></div>; }
function ChartEmpty() { return <div style={{ width: '100%' }}><div style={{ fontWeight: 700, fontSize: 13, marginBottom: 14, color: 'var(--gl-fg-1)' }}>Revenue trend</div><div style={{ height: 150, borderRadius: 8, border: '1px dashed var(--gl-border-strong)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, color: 'var(--gl-fg-3)' }}><GLIcon name="poll" size={26} /><span style={{ fontSize: 12.5 }}>No data for this period</span></div></div>; }
function ChartError() { return <div style={{ width: '100%' }}><div style={{ fontWeight: 700, fontSize: 13, marginBottom: 14, color: 'var(--gl-fg-1)' }}>Revenue trend</div><div style={{ height: 150, borderRadius: 8, border: '1px dashed rgba(239,68,68,.4)', background: 'rgba(239,68,68,.05)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, color: RED }}><GLIcon name="alert" size={26} /><span style={{ fontSize: 12.5 }}>Couldn't load chart</span><DSButton size="sm" variant="secondary">Retry</DSButton></div></div>; }

function App() {
  return (
    <Shell title="Charts" subtitle="GeniusLink Design System · V2 Stage E">
      <Section title="Trend charts" desc="Line & area with hover tooltip, axis labels, legend. Colors and timing come from tokens; responsive via viewBox." cols="repeat(auto-fill, minmax(360px, 1fr))">
        <Spec label="Line chart"><LineArea /></Spec>
        <Spec label="Area chart"><LineArea area /></Spec>
      </Section>
      <Section title="Comparison & composition" cols="repeat(auto-fill, minmax(360px, 1fr))">
        <Spec label="Bar chart"><BarChart /></Spec>
        <Spec label="Donut chart"><Donut /></Spec>
      </Section>
      <Section title="Progress & KPI" cols="repeat(auto-fill, minmax(280px, 1fr))">
        <Spec label="Progress charts"><div style={{ display: 'flex', gap: 24, width: '100%', justifyContent: 'center' }}><ProgressRing pct={72} label="Q4 close" color={GREEN} /><ProgressRing pct={45} label="Budget used" color={ORANGE} /></div></Spec>
        <Spec label="KPI + mini chart"><KpiSpark label="Revenue MTD" value="89.2k" delta="12.4%" up /></Spec>
        <Spec label="KPI (down)"><KpiSpark label="Expenses MTD" value="56.3k" delta="2.1%" up={false} /></Spec>
      </Section>
      <Section title="Chart states" desc="Every chart ships with loading, empty and error states." cols="repeat(auto-fill, minmax(280px, 1fr))">
        <Spec label="Loading"><ChartLoading /></Spec>
        <Spec label="Empty"><ChartEmpty /></Spec>
        <Spec label="Error"><ChartError /></Spec>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
const kf = document.createElement('style'); kf.textContent = '@keyframes dsshimmer-bg{0%{background-position:100% 0}100%{background-position:0 0}}'; document.head.appendChild(kf);
</script>
</body>
</html>
