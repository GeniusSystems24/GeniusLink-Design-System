<!DOCTYPE html><html><head><meta charset="utf-8"><title>Card Anatomy</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <!-- Full card example -->
  <div style="background:#1E2025;border:1px solid rgba(67,70,84,.4);border-radius:8px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);padding:24px;display:flex;flex-direction:column;gap:24px">
    <div style="display:flex;gap:12px">
      <div style="width:4px;align-self:stretch;border-radius:12px;background:#4A7CFF"></div>
      <div>
        <div style="font-weight:700;font-size:16px;color:#E2E2E9">Group Details</div>
        <div style="font-size:12px;color:#8D90A0;margin-top:4px">Define name and account tree association</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#C3C6D7;margin-bottom:8px">Name English *</div>
        <div style="height:40px;padding:0 16px;display:flex;align-items:center;background:#33353A;border:1px solid #6B7280;border-radius:4px;font-size:14px;color:#8D90A0">e.g. Current Assets</div>
      </div>
      <div dir="rtl">
        <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#C3C6D7;margin-bottom:8px">الاسم بالعربية *</div>
        <div style="height:40px;padding:0 16px;display:flex;align-items:center;background:#33353A;border:1px solid #6B7280;border-radius:4px;font-family:'Noto Naskh Arabic',serif;font-size:14px;color:#8D90A0">مثال: الأصول المتداولة</div>
      </div>
    </div>
  </div>
</div>
</body></html>
