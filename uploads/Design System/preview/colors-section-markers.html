<!DOCTYPE html><html><head><meta charset="utf-8"><title>Section Markers</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
    <div style="display:flex;gap:12px;padding:14px;background:var(--gl-dark-bg);border-radius:6px;border:1px solid var(--gl-border)">
      <div style="width:4px;align-self:stretch;border-radius:12px;background:#4A7CFF"></div>
      <div>
        <div style="font-weight:700;font-size:14px;color:var(--gl-fg-1)">Identity</div>
        <div style="font-size:11px;color:var(--gl-fg-3);margin-top:2px">Details · Definition</div>
        <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-top:8px">#4A7CFF</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;padding:14px;background:var(--gl-dark-bg);border-radius:6px;border:1px solid var(--gl-border)">
      <div style="width:4px;align-self:stretch;border-radius:12px;background:#1DB88A"></div>
      <div>
        <div style="font-weight:700;font-size:14px;color:var(--gl-fg-1)">Ledger</div>
        <div style="font-size:11px;color:var(--gl-fg-3);margin-top:2px">Balance · Transfer</div>
        <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-top:8px">#1DB88A</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;padding:14px;background:var(--gl-dark-bg);border-radius:6px;border:1px solid var(--gl-border)">
      <div style="width:4px;align-self:stretch;border-radius:12px;background:#F97316"></div>
      <div>
        <div style="font-weight:700;font-size:14px;color:var(--gl-fg-1)">Notes</div>
        <div style="font-size:11px;color:var(--gl-fg-3);margin-top:2px">Compliance · Audit</div>
        <div style="font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);margin-top:8px">#F97316</div>
      </div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    The 4 × 40 px pill at the top-left of every section card. The brand's signature device.
  </div>
</div>
</body></html>
