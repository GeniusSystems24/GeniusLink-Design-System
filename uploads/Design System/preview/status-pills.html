<!DOCTYPE html><html><head><meta charset="utf-8"><title>Status Pills</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">

    <span style="padding:4px 12px;background:rgba(29,184,138,.18);color:#1DB88A;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Active</span>

    <span style="padding:4px 12px;background:rgba(141,144,160,.18);color:var(--gl-fg-3);border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Draft</span>
  </div>
  <div style="display:flex;gap:24px;font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">

  </div>
