<!DOCTYPE html><html><head><meta charset="utf-8"><title>Icons</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:14px;align-items:end">
    <!-- lucide-styled outline icons; 1.5px stroke, rounded -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18l-1.5 11a1 1 0 0 1-1 .9H5.5a1 1 0 0 1-1-.9L3 9z"/><path d="M3 9l2-5h14l2 5"/><path d="M9 13h6"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">store</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M16 8l-3 9-4-4-1 1"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">compass</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="1"/><path d="M6 9v6M9 9v6M12 9v6M15 9v6M18 9v6"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">scanner</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">edit</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">delete</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">lock</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><path d="M12 15V3"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">download</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">document</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">check</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">close</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">search</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">plus</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">back</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">chevron</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">info</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C3C6D7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l4 4-1.4 1.4-4-4a1 1 0 0 0-1.4 0L2 19l5 5 11.9-11.9a1 1 0 0 0 0-1.4l-4-4z"/></svg>
      <span style="font-family:var(--gl-font-mono);font-size:9px;color:var(--gl-fg-3)">tool</span>
    </div>
  </div>
  <div style="font-size:12px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    Outline · 1.5 px stroke · rounded caps · 16–22 px. Inherit <code style="font-family:var(--gl-font-mono);color:var(--gl-fg-2)">currentColor</code>. Source: Lucide-style; production swaps to SVGs in <code style="font-family:var(--gl-font-mono);color:var(--gl-fg-2)">assets/icons/</code>.
  </div>
</div>
</body></html>
