<!DOCTYPE html><html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div>
      <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-2);margin-bottom:8px">Name English *</div>
      <input style="width:100%;height:40px;padding:0 16px;background:var(--gl-input-bg);border:1px solid var(--gl-border-strong);border-radius:4px;font-family:var(--gl-font-body);font-size:14px;color:var(--gl-fg-1);outline:none" placeholder="e.g. Downtown Central Store"/>
    </div>
    <div>
      <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-2);margin-bottom:8px">Location Code</div>
      <input style="width:100%;height:40px;padding:0 16px;background:var(--gl-input-bg);border:2px solid #4A7CFF;border-radius:4px;font-family:var(--gl-font-mono);font-size:14px;color:var(--gl-fg-1);outline:none" value="ST-001"/>
    </div>
    <div>
      <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-2);margin-bottom:8px">Store Category</div>
      <div style="height:40px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--gl-input-bg);border:1px solid var(--gl-border-strong);border-radius:4px;font-size:14px;color:var(--gl-fg-1)">Retail<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9l6 6 6-6"/></svg></div>
    </div>
    <div>
      <div style="font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gl-fg-2);margin-bottom:8px">Serial No *</div>
      <div style="height:40px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--gl-input-bg);border:1px solid var(--gl-border-strong);border-radius:4px;font-family:var(--gl-font-mono);font-size:14px;color:var(--gl-fg-1)">INV-ISS-2024-0089<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gl-fg-3)" stroke-width="1.6"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    </div>
  </div>
  <div style="display:flex;gap:24px;font-family:var(--gl-font-mono);font-size:10px;color:var(--gl-fg-3);padding-top:8px;border-top:1px solid var(--gl-border)">
    <span>default</span><span style="color:#4A7CFF">focused (2px solid blue)</span><span>select</span><span>locked (mono + 🔒)</span>
  </div>
</div>
</body></html>
