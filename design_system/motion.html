<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — Motion</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html,body{margin:0;padding:0}body{font-family:var(--gl-font-body)}::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--gl-border-strong);border-radius:5px}
  @keyframes mFade{from{opacity:0}to{opacity:1}}
  @keyframes mSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes mScale{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  @keyframes mSheet{from{transform:translateY(100%)}to{transform:none}}
  @keyframes mPress{0%{transform:scale(1)}40%{transform:scale(.94)}100%{transform:scale(1)}}
  @keyframes mShim{100%{transform:translateX(100%)}}
  .demo .box{opacity:0}
  .demo.run .box{opacity:1}
  .demo.run .fade{animation:mFade var(--gl-dur-slow) var(--gl-ease-standard)}
  .demo.run .slide{animation:mSlide var(--gl-dur-slow) var(--gl-ease-out)}
  .demo.run .scale{animation:mScale var(--gl-dur-moderate) var(--gl-ease-emphasized)}
  .demo.run .sheet{animation:mSheet var(--gl-dur-slow) var(--gl-ease-emphasized)}
  .demo.run .stagger > *{opacity:0;animation:mSlide var(--gl-dur-moderate) var(--gl-ease-out) forwards}
  .demo.run .stagger > *:nth-child(1){animation-delay:0ms}
  .demo.run .stagger > *:nth-child(2){animation-delay:60ms}
  .demo.run .stagger > *:nth-child(3){animation-delay:120ms}
  .demo.run .stagger > *:nth-child(4){animation-delay:180ms}
  .demo .expand{max-height:0;overflow:hidden;transition:max-height var(--gl-dur-moderate) var(--gl-ease-standard)}
  .demo.run .expand{max-height:120px}
  @media (prefers-reduced-motion: reduce){.demo *{animation:none!important;transition:none!important;opacity:1!important;max-height:none!important}}
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><rect x="24" y="56" width="20" height="20" rx="4" fill="#33353A"/><rect x="40" y="44" width="20" height="20" rx="4" fill="#4A7CFF"/><rect x="56" y="30" width="20" height="20" rx="4" fill="#1DB88A"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ds-kit.jsx"></script>
<script type="text/babel">
const { GLIcon, DSButton, DSPill, Shell, Section, Spec } = window;
const BLUE = 'var(--gl-blue-500)', GREEN = 'var(--gl-success-500)';

// replays animation by toggling .run class on a key bump
function Demo({ children, cls }) {
  const [k, setK] = React.useState(0);
  React.useEffect(() => { const t = setInterval(() => setK(x => x + 1), 2600); return () => clearInterval(t); }, []);
  return <div className="demo run" key={k} onClick={() => setK(x => x + 1)} style={{ width: '100%', minHeight: 96, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)', cursor: 'pointer', overflow: 'hidden', padding: 14 }}><div className={'box ' + cls} style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{children}</div></div>;
}
function Pillbox({ c = BLUE, children }) { return <div style={{ padding: '14px 20px', background: c, color: '#fff', borderRadius: 10, fontWeight: 600, fontSize: 14 }}>{children}</div>; }

function PressBtn() {
  const [k, setK] = React.useState(0);
  return <div style={{ width: '100%', minHeight: 96, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)' }}><button key={k} onClick={() => setK(x => x + 1)} style={{ animation: k ? 'mPress var(--gl-dur-moderate) var(--gl-ease-standard)' : 'none', background: BLUE, color: '#fff', border: 'none', borderRadius: 8, padding: '12px 22px', fontWeight: 600, fontSize: 14, cursor: 'pointer', fontFamily: 'var(--gl-font-body)' }}>Tap me</button></div>;
}
function Shimmer() {
  return <div style={{ width: '100%', minHeight: 96, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--gl-bg)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-md)', padding: 14 }}><div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 8 }}>{[100, 70, 85].map((w, i) => <div key={i} style={{ position: 'relative', overflow: 'hidden', height: 12, width: w + '%', borderRadius: 6, background: 'var(--gl-input-bg)' }}><div style={{ position: 'absolute', inset: 0, transform: 'translateX(-100%)', background: 'linear-gradient(90deg,transparent,color-mix(in srgb,var(--gl-fg-1) 9%,transparent),transparent)', animation: 'mShim 1.4s ease-in-out infinite' }} /></div>)}</div></div>;
}

function TokenRow({ k, v, d }) {
  return <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: 12, padding: '10px 0', borderBottom: '1px solid var(--gl-border)', alignItems: 'baseline' }}><span style={{ fontFamily: 'var(--gl-font-mono)', fontSize: 12, color: BLUE }}>{k}</span><span style={{ fontSize: 12.5, color: 'var(--gl-fg-2)' }}><span style={{ fontFamily: 'var(--gl-font-mono)', color: 'var(--gl-fg-1)' }}>{v}</span> — {d}</span></div>;
}

function App() {
  return (
    <Shell title="Motion & Animation" subtitle="GeniusLink Design System · V2 Stage J">
      <Section title="Animation tokens" desc="Durations and easing curves are single-sourced. Stagger 40ms for list/message entrance. Honours prefers-reduced-motion (everything collapses to instant)." cols="1fr">
        <div style={{ gridColumn: '1 / -1', background: 'var(--gl-surface)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-lg)', padding: '8px 20px' }}>
          <TokenRow k="--gl-dur-fast" v="100ms" d="hover tint, icon swaps" />
          <TokenRow k="--gl-dur-base" v="150ms" d="default color/background transitions" />
          <TokenRow k="--gl-dur-moderate" v="200ms" d="expand / collapse, button press" />
          <TokenRow k="--gl-dur-slow" v="300ms" d="bottom sheet, dialog, page" />
          <TokenRow k="--gl-ease-standard" v="cubic-bezier(.4,0,.2,1)" d="general purpose" />
          <TokenRow k="--gl-ease-out" v="cubic-bezier(0,0,.2,1)" d="enter / decelerate" />
          <TokenRow k="--gl-ease-emphasized" v="cubic-bezier(.2,0,0,1)" d="sheets & dialogs" />
        </div>
      </Section>
      <Section title="Entrance & transitions" desc="Click any tile to replay (they also auto-loop)." cols="repeat(auto-fill, minmax(240px, 1fr))">
        <Spec label="Fade"><Demo cls="fade"><Pillbox>Fade in</Pillbox></Demo></Spec>
        <Spec label="Slide"><Demo cls="slide"><Pillbox c={GREEN}>Slide up</Pillbox></Demo></Spec>
        <Spec label="Scale"><Demo cls="scale"><Pillbox>Scale in</Pillbox></Demo></Spec>
        <Spec label="Bottom sheet"><Demo cls="sheet"><Pillbox c={GREEN}>Sheet ↑</Pillbox></Demo></Spec>
      </Section>
      <Section title="Lists & micro-interactions" cols="repeat(auto-fill, minmax(240px, 1fr))">
        <Spec label="Stagger (40ms)"><Demo cls=""><div className="stagger" style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 6 }}>{['Cash Box', 'Bank · NCB', 'Inventory', 'Payable'].map(t => <div key={t} style={{ padding: '8px 12px', background: 'var(--gl-surface)', border: '1px solid var(--gl-border)', borderRadius: 6, fontSize: 12.5, color: 'var(--gl-fg-1)' }}>{t}</div>)}</div></Demo></Spec>
        <Spec label="Expand / collapse"><Demo cls=""><div style={{ width: '100%' }}><div style={{ fontSize: 12.5, color: 'var(--gl-fg-2)', marginBottom: 6 }}>Group details ▾</div><div className="expand" style={{ background: 'var(--gl-surface)', border: '1px solid var(--gl-border)', borderRadius: 6, padding: '0 12px' }}><div style={{ padding: '12px 0', fontSize: 12, color: 'var(--gl-fg-3)' }}>Cash · Receivables · Inventory</div></div></div></Demo></Spec>
        <Spec label="Button press"><PressBtn /></Spec>
        <Spec label="Shimmer (loading)"><Shimmer /></Spec>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
