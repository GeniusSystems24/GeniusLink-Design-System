<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — BrowserStyleTabBar</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; } body { font-family: var(--gl-font-body); }
  ::-webkit-scrollbar { width: 9px; height: 9px; } ::-webkit-scrollbar-thumb { background: var(--gl-border-strong); border-radius: 5px; }
  [role="tablist"]::-webkit-scrollbar, [role="tablist"] div::-webkit-scrollbar { height: 0; display: none; }
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><rect x="14" y="28" width="30" height="16" rx="4" fill="#1E2025"/><rect x="46" y="30" width="26" height="14" rx="3" fill="#33353A"/><rect x="14" y="44" width="72" height="30" rx="4" fill="#1E2025"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ds-kit.jsx"></script>
<script type="text/babel" src="BrowserTabs.jsx"></script>
<script type="text/babel">
const { Shell, Section, Spec, BrowserStyleTabBar } = window;
function App() {
  return (
    <Shell title="BrowserStyleTabBar" subtitle="GeniusLink Design System · V2 Stage D">
      <Section title="Workspace Tabs" desc="Modern browser-style tab strip: rounded active tab merges with the surface; inactive tabs are muted with subtle separators. Add (+), close (×), select, horizontal overflow scroll, unsaved-changes dot, long-title truncation + tooltip, and ←/→ keyboard nav. Dark/light + RTL." cols="1fr">
        <div style={{ gridColumn: '1 / -1' }}><BrowserStyleTabBar /></div>
      </Section>
      <Section title="LTR & RTL" desc="The same component mirrored — separators, close buttons and the + button all flip with direction." cols="1fr">
        <div style={{ gridColumn: '1 / -1' }} dir="rtl"><BrowserStyleTabBar tabsState={[{ id: 11, title: 'دليل الحسابات', icon: 'ledger' }, { id: 12, title: 'قيد افتتاحي', icon: 'doc', dirty: true }, { id: 13, title: 'لوحة التحكم', icon: 'chart' }]} /></div>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
