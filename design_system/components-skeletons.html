<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — Skeletons</title>
<meta name="viewport" content="width=1180" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; } body { font-family: var(--gl-font-body); }
  ::-webkit-scrollbar { width: 9px; height: 9px; } ::-webkit-scrollbar-thumb { background: var(--gl-border-strong); border-radius: 5px; }
  .sk { position: relative; overflow: hidden; background: var(--gl-input-bg); border-radius: 6px; }
  .sk.shimmer::after { content: ''; position: absolute; inset: 0; transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--gl-fg-1) 8%, transparent), transparent);
    animation: sksweep 1.4s ease-in-out infinite; }
  @keyframes sksweep { 100% { transform: translateX(100%); } }
  @media (prefers-reduced-motion: reduce) { .sk.shimmer::after { animation: none; } }
</style>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#111318"/><circle cx="30" cy="34" r="10" fill="#33353A"/><rect x="46" y="28" width="38" height="6" rx="3" fill="#33353A"/><rect x="46" y="40" width="26" height="6" rx="3" fill="#2A2D34"/><rect x="16" y="58" width="68" height="6" rx="3" fill="#33353A"/><rect x="16" y="70" width="52" height="6" rx="3" fill="#2A2D34"/></svg></template>
</head>
<body data-theme="">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ds-kit.jsx"></script>
<script type="text/babel">
const { Shell, Section, Spec, DSDivider } = window;

// Bone: a single skeleton block. mode = 'shimmer' | 'static'
function Bone({ w = '100%', h = 12, r = 6, mode = 'shimmer', style }) {
  return <div className={'sk' + (mode === 'shimmer' ? ' shimmer' : '')} style={{ width: w, height: h, borderRadius: r, ...style }} />;
}

function TextSk({ mode, lines = 3 }) {
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 9 }}>{Array.from({ length: lines }).map((_, i) => <Bone key={i} mode={mode} h={11} w={i === lines - 1 ? '60%' : '100%'} />)}</div>;
}
function AvatarSk({ mode }) {
  return <div style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%' }}><Bone mode={mode} w={40} h={40} r={999} /><div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}><Bone mode={mode} h={11} w="50%" /><Bone mode={mode} h={9} w="30%" /></div></div>;
}
function CardSk({ mode }) {
  return <div style={{ width: '100%', background: 'var(--gl-surface)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-lg)', padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}><Bone mode={mode} h={120} r={8} /><Bone mode={mode} h={13} w="70%" /><Bone mode={mode} h={10} w="45%" /></div>;
}
function ListSk({ mode }) {
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 16 }}>{[0, 1, 2].map(i => <AvatarSk key={i} mode={mode} />)}</div>;
}
function TableSk({ mode }) {
  return <div style={{ width: '100%' }}>{[0, 1, 2, 3].map(i => <div key={i} style={{ display: 'grid', gridTemplateColumns: '40px 2fr 1fr 1fr', gap: 12, padding: '11px 0', borderBottom: '1px solid var(--gl-border)' }}><Bone mode={mode} h={10} /><Bone mode={mode} h={10} /><Bone mode={mode} h={10} /><Bone mode={mode} h={10} /></div>)}</div>;
}
function ChatSk({ mode }) {
  return <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 12 }}>
    <div style={{ display: 'flex', justifyContent: 'flex-start' }}><Bone mode={mode} w={160} h={38} r={14} /></div>
    <div style={{ display: 'flex', justifyContent: 'flex-end' }}><Bone mode={mode} w={120} h={30} r={14} /></div>
    <div style={{ display: 'flex', justifyContent: 'flex-start' }}><Bone mode={mode} w={190} h={48} r={14} /></div>
  </div>;
}
function DashCardSk({ mode }) {
  return <div style={{ width: '100%', background: 'var(--gl-surface)', border: '1px solid var(--gl-border)', borderRadius: 'var(--gl-radius-lg)', padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}><Bone mode={mode} h={9} w="40%" /><Bone mode={mode} h={26} w="60%" /><Bone mode={mode} h={9} w="30%" /></div>;
}
function ChartSk({ mode }) {
  return <div style={{ width: '100%', display: 'flex', alignItems: 'flex-end', gap: 10, height: 130 }}>{[40, 65, 50, 80, 60, 95].map((h, i) => <Bone key={i} mode={mode} w="100%" h={`${h}%`} r={4} style={{ flex: 1 }} />)}</div>;
}

function App() {
  const [mode, setMode] = React.useState('shimmer');
  return (
    <Shell title="Skeleton Loaders" subtitle="GeniusLink Design System · V2 Stage F">
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 28 }}>
        <span style={{ fontWeight: 700, fontSize: 10, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--gl-fg-3)' }}>Mode</span>
        <div style={{ display: 'flex', gap: 4, background: 'var(--gl-input-bg)', padding: 4, borderRadius: 6, border: '1px solid var(--gl-border)' }}>
          {['shimmer', 'static'].map(m => <button key={m} onClick={() => setMode(m)} style={{ padding: '6px 14px', borderRadius: 4, background: mode === m ? 'var(--gl-surface)' : 'transparent', color: mode === m ? 'var(--gl-fg-1)' : 'var(--gl-fg-3)', border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: 10, letterSpacing: '.1em', textTransform: 'uppercase', fontFamily: 'var(--gl-font-body)' }}>{m}</button>)}
        </div>
        <span style={{ fontSize: 12, color: 'var(--gl-fg-3)' }}>· honours <code style={{ fontFamily: 'var(--gl-font-mono)' }}>prefers-reduced-motion</code></span>
      </div>
      <Section title="Primitives" cols="repeat(auto-fill, minmax(240px, 1fr))">
        <Spec label="Text"><TextSk mode={mode} /></Spec>
        <Spec label="Avatar + meta"><AvatarSk mode={mode} /></Spec>
        <Spec label="List items"><ListSk mode={mode} /></Spec>
      </Section>
      <Section title="Composite" cols="repeat(auto-fill, minmax(260px, 1fr))">
        <Spec label="Card"><CardSk mode={mode} /></Spec>
        <Spec label="Dashboard card"><DashCardSk mode={mode} /></Spec>
        <Spec label="Chat bubbles"><ChatSk mode={mode} /></Spec>
      </Section>
      <Section title="Data" cols="repeat(auto-fill, minmax(300px, 1fr))">
        <Spec label="Table rows"><TableSk mode={mode} /></Spec>
        <Spec label="Chart"><ChartSk mode={mode} /></Spec>
      </Section>
    </Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
