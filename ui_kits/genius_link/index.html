<title>GeniusLink UI Kit</title>

<link rel="stylesheet" href="../../colors_and_type.css" />

<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
  body {
    background: var(--gl-bg);
    color: var(--gl-fg-1);
    font-family: var(--gl-font-body);
  }
  /* Slim, theme-aware scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gl-border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #4A7CFF; }

  /* Form grid — cards lay fields out in up to 4 columns (xl).
     Compact fields take 1 column; full-width blocks span every column. */
  .gl-form-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 24px;
    align-items: start;
  }
  .gl-col-full { grid-column: 1 / -1; }
  @media (max-width: 1080px) {
    .gl-form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 600px) {
    .gl-form-grid { grid-template-columns: 1fr; }
  }
</style>
