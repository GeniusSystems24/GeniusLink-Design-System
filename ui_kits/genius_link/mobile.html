<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GeniusLink — Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    background: #0B0C10;
    font-family: var(--gl-font-body);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px; box-sizing: border-box;
    background-image: radial-gradient(circle at 50% 0%, #15171E 0%, #0B0C10 60%);
  }
  #root { display: flex; gap: 48px; align-items: center; justify-content: center; flex-wrap: wrap; }
  #scaler { transform-origin: center center; }
  /* hide the iOS content scrollbar so it doesn't break the bezel */
  #scaler ::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none; }
  #scaler * { scrollbar-width: none; -ms-overflow-style: none; }
</style>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#111318"/>
    <rect x="34" y="20" width="32" height="60" rx="7" fill="#1E2025" stroke="#4A7CFF" stroke-width="1.5"/>
    <rect x="40" y="28" width="3" height="10" rx="1.5" fill="#4A7CFF"/>
    <rect x="46" y="30" width="16" height="2.4" rx="1" fill="#E2E2E9"/>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Mobile.jsx"></script>
<script type="text/babel" src="MobileScreens.jsx"></script>

<script type="text/babel">
  function MobileDemo() {
    return (
      <div id="scaler">
        <IOSDevice dark>
          <window.MobileApp />
        </IOSDevice>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<MobileDemo />);

  // Scale the phone to fit the viewport height
  function fit() {
    const s = document.getElementById('scaler');
    if (!s) return;
    const k = Math.min(1, (window.innerHeight - 48) / 874);
    s.style.transform = `scale(${k})`;
  }
  window.addEventListener('resize', fit);
  const obs = new MutationObserver(fit);
  obs.observe(document.getElementById('root'), { childList: true, subtree: true });
  setTimeout(fit, 300);
</script>
</body>
</html>
